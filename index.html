.form{display:grid;gap:14px}.field{display:grid;gap:7px}.field label{font-size:12px;color:#536379;text-transform:uppercase;letter-spacing:.65px;font-weight:900}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 14px;color:var(--ink);outline:0;transition:.2s ease}.field textarea{min-height:116px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:#88b8ff;box-shadow:0 0 0 5px rgba(13,91,210,.08)}.filters{display:grid;grid-template-columns:1.3fr repeat(3,.8fr);gap:10px;margin-bottom:14px}.empty{padding:26px;border:1px dashed #cbd5e1;border-radius:24px;color:var(--muted);text-align:center;background:#fbfdff;line-height:1.6}

.login-page{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(1120px,100%);display:grid;grid-template-columns:1.05fr .95fr;overflow:hidden;border-radius:36px;background:rgba(255,255,255,.94);box-shadow:0 40px 100px rgba(13,37,76,.18);border:1px solid rgba(255,255,255,.85)}.login-hero{position:relative;padding:42px;background:radial-gradient(circle at 20% 12%,rgba(255,217,92,.6),transparent 32%),linear-gradient(145deg,#0b3b82,#0d5bd2);color:#fff;min-height:610px;display:grid;align-content:start;justify-items:center}.login-hero img.logo-login{width:min(530px,100%);padding:15px;background:#fff;border-radius:24px;box-shadow:0 26px 55px rgba(0,0,0,.14)}.hero-note{margin-top:16px;color:rgba(255,255,255,.88);text-align:center;max-width:480px;line-height:1.6}.dance-box{position:absolute;left:42px;right:42px;bottom:42px;display:flex;align-items:center;gap:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.26);padding:18px;border-radius:28px;backdrop-filter:blur(10px)}.dance-box img{width:112px;height:112px;border-radius:24px;object-fit:cover;background:#fff}.dance-box h1{margin:0;font-size:34px;line-height:1}.dance-box p{margin:10px 0 0;opacity:.88}.login-form{padding:42px;display:grid;align-content:center;gap:18px}.login-form h2{font-size:34px;margin:0;letter-spacing:-1px}.login-form p{margin:0;color:var(--muted);line-height:1.55}

/* Microinteracciones premium + íconos soporte real + dashboard ejecutivo */
.nav button .icon{font-size:17px;position:relative;overflow:hidden}
.nav button.active .icon::after{content:"";position:absolute;inset:-8px;border-radius:18px;background:radial-gradient(circle,rgba(255,255,255,.24),transparent 60%);animation:deskPulse 2.8s ease-in-out infinite}
.btn{position:relative;overflow:hidden;transform:translateZ(0)}
.btn::after{content:"";position:absolute;inset:auto auto 50% 50%;width:0;height:0;border-radius:999px;background:rgba(255,255,255,.22);transform:translate(-50%,50%);transition:width .35s ease,height .35s ease;pointer-events:none}
.btn:hover::after{width:240px;height:240px}
.btn:active,.answer:active,.micro-card:active,.mini-ticket:active{transform:translateY(0) scale(.985)!important}
.card,.metric,.profile-card,.lane,.mini-ticket,.answer,.micro-card,.compare-card,.code-card{will-change:transform;transform:translateZ(0)}
.card:hover{border-color:rgba(89,145,255,.24)!important}
.clickable-row td{transition:background .18s ease,color .18s ease}
.ticket-view .card:first-child{position:relative;overflow:hidden}
.ticket-view .card:first-child::before{content:"";position:absolute;left:0;top:0;right:0;height:4px;background:linear-gradient(90deg,#1e63ff,#60a5fa,#f7bf24);opacity:.9}
.field input,.field select,.field textarea{transition:border-color .18s ease,box-shadow .18s ease,background .18s ease,transform .18s ease}
.field input:focus,.field select:focus,.field textarea:focus{transform:translateY(-1px)}
.float-ai{animation:floatAiBreath 3.4s ease-in-out infinite}
.executive-hero{position:relative;overflow:hidden;display:grid;grid-template-columns:minmax(0,1.25fr) minmax(280px,.75fr);gap:18px;margin-bottom:18px}
.executive-card{position:relative;padding:24px;border-radius:32px;background:linear-gradient(135deg,rgba(30,99,255,.26),rgba(255,255,255,.08));border:1px solid rgba(171,198,255,.16);box-shadow:0 24px 50px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(16px);overflow:hidden}
.executive-card::after{content:"";position:absolute;width:260px;height:260px;border-radius:50%;right:-90px;top:-120px;background:radial-gradient(circle,rgba(96,165,250,.24),transparent 68%)}
.executive-kicker{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);color:#dbeafe;font-size:12px;font-weight:900}
.executive-title{margin:14px 0 8px;font-size:clamp(28px,4vw,44px);line-height:.98;letter-spacing:-1.4px;color:#fff}
.executive-sub{max-width:720px;margin:0;color:#aec0dc;line-height:1.55;font-size:14px}
.executive-strip{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.executive-chip{display:inline-flex;align-items:center;gap:7px;padding:9px 12px;border-radius:999px;background:rgba(11,24,45,.46);border:1px solid rgba(171,198,255,.12);font-size:12px;color:#dbeafe;font-weight:800}
.health-panel{display:grid;gap:12px}
.health-row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:13px 14px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(171,198,255,.10)}
.health-row span{color:#a9bad6;font-size:12px;font-weight:800}.health-row strong{color:#fff;font-size:18px}
.metric.service:before{background:linear-gradient(180deg,#60a5fa,#1e63ff)}.metric.warn:before{background:linear-gradient(180deg,#f7bf24,#f97316)}.metric.success:before{background:linear-gradient(180deg,#34d399,#10b981)}.metric.danger:before{background:linear-gradient(180deg,#fb7185,#ef4444)}
.sla-bar{height:10px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden;border:1px solid rgba(171,198,255,.10);margin-top:14px}
.sla-bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#34d399,#60a5fa,#f7bf24);box-shadow:0 0 18px rgba(96,165,250,.35)}
.support-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:18px}
.support-mini{padding:16px;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.05));border:1px solid rgba(171,198,255,.11)}
.support-mini small{display:block;color:#9eb1cf;font-weight:900;text-transform:uppercase;letter-spacing:.7px;font-size:10px}
.support-mini strong{display:block;color:#fff;font-size:24px;margin-top:6px}
@keyframes deskPulse{0%,100%{opacity:.45;transform:scale(.9)}50%{opacity:.9;transform:scale(1.12)}}
@keyframes floatAiBreath{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@media(max-width:1050px){.executive-hero{grid-template-columns:1fr}.support-row{grid-template-columns:1fr 1fr}}

/* =========================================================
   MANUAL DE MARCA: blanco + azul + amarillo
   Versión premium clara, funcional y optimizada
   ========================================================= */
:root{
  --blue:#0b3b82;
  --blue2:#0d5bd2;
  --blue3:#eaf2ff;
  --gold:#f7bf24;
  --gold2:#fff7db;
  --white:#ffffff;
  --ink:#0b3b82;
  --muted:#315783;
  --ok:#0d5bd2;
  --warn:#f7bf24;
  --bad:#0b3b82;
  --line:rgba(11,59,130,.14);
  --shadow:0 22px 48px rgba(11,59,130,.10);
  --radius:28px;
}

/* Fondo institucional blanco con textura sutil azul/amarilla */
html,body{
  color:var(--blue);
  background:
    radial-gradient(circle at 8% -6%,rgba(247,191,36,.16),transparent 30%),
    radial-gradient(circle at 100% 0%,rgba(13,91,210,.10),transparent 28%),
    linear-gradient(145deg,#ffffff,#ffffff 48%,#f7fbff 100%) !important;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.42;
  background-image:
    radial-gradient(circle at 1px 1px,rgba(11,59,130,.08) 1px,transparent 1.2px),
    linear-gradient(rgba(11,59,130,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(11,59,130,.025) 1px,transparent 1px);
  background-size:26px 26px,26px 26px,26px 26px;
  mask-image:radial-gradient(circle at center,black 62%,transparent 100%);
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(circle at top right,rgba(247,191,36,.12),transparent 24%),
    radial-gradient(circle at left center,rgba(13,91,210,.08),transparent 28%);
}

/* =========================================================
   QA FIX REAL: MENÚ MÓVIL SUPERPUESTO, SIN ESPACIO RESERVADO
   Causa del espacio blanco: el sidebar/menu de las 3 rayitas quedaba
   participando en el layout móvil y empujaba el contenido hacia abajo.
   En móvil debe ser drawer overlay, nunca ocupar espacio de página.
   ========================================================= */

@media(max-width:880px){
  body.mobile-menu-open{
    overflow:hidden!important;
  }

  .app-shell{
    display:block!important;
    grid-template-columns:none!important;
    min-height:100svh!important;
    width:100%!important;
    overflow:visible!important;
    background:#f7fbff!important;
  }

  .main{
    display:block!important;
    width:100%!important;
    margin:0!important;
    min-width:0!important;
    min-height:100svh!important;
    padding:10px 10px calc(22px + env(safe-area-inset-bottom))!important;
    background:#f7fbff!important;
    overflow:visible!important;
  }

  /* El sidebar queda completamente fuera del flujo */
  .sidebar{
    position:fixed!important;
    top:0!important;
    left:0!important;
    bottom:0!important;
    width:min(310px,86vw)!important;
    height:100dvh!important;
    max-height:100dvh!important;
    z-index:9990!important;
    transform:translateX(-112%)!important;
    transition:transform .24s ease!important;
    margin:0!important;
    border-radius:0 28px 28px 0!important;
    box-shadow:28px 0 70px rgba(3,22,45,.30)!important;
    overflow-y:auto!important;
    -webkit-overflow-scrolling:touch!important;
  }

  .sidebar.open{
    transform:translateX(0)!important;
    left:0!important;
  }

  .sidebar:not(.open){
    pointer-events:none!important;
  }

  /* Capa oscura detrás del menú */
  .menu-backdrop{
    position:fixed!important;
    inset:0!important;
    z-index:9988!important;
    background:rgba(3,22,45,.34)!important;
    backdrop-filter:blur(2px)!important;
    opacity:0!important;
    visibility:hidden!important;
    pointer-events:none!important;
    transition:opacity .2s ease, visibility .2s ease!important;
  }

  body.mobile-menu-open .menu-backdrop{
    opacity:1!important;
    visibility:visible!important;
    pointer-events:auto!important;
  }

  /* La barra superior no debe dejar huecos gigantes */
  .topbar{
    position:relative!important;
    top:auto!important;
    z-index:40!important;
    margin:0 0 10px 0!important;
  }

  body.create-mobile-compact .topbar{
    margin:0 0 8px 0!important;
  }

  /* Radicar solicitud empieza inmediatamente debajo del topbar */
  body.create-mobile-compact .content,
  body.create-mobile-compact #view,
  body.create-mobile-compact .simple-request-shell{
    margin-top:0!important;
    padding-top:0!important;
  }

  body.create-mobile-compact .simple-request-shell{
    display:flex!important;
    flex-direction:column!important;
    gap:10px!important;
  }

  /* Evitar cualquier offset viejo que venga del menú */
  body.create-mobile-compact .sidebar + .main,
  body.create-mobile-compact aside + main{
    margin-top:0!important;
    padding-top:10px!important;
  }
}


/* =========================================================
   QA FIX: MENÚ 3 RAYAS FUNCIONAL EN IOS/MÓVIL
   Problema: el menú salía superpuesto, pero la capa/backdrop podía interceptar
   los toques o el sidebar heredaba pointer-events bloqueados.
   ========================================================= */
@media(max-width:880px){
  .sidebar{
    z-index:2147483000!important;
  }

  .sidebar.open{
    transform:translateX(0)!important;
    left:0!important;
    pointer-events:auto!important;
    touch-action:auto!important;
  }

  .sidebar.open,
  .sidebar.open *,
  .sidebar.open button,
  .sidebar.open a,
  .sidebar.open .nav,
  .sidebar.open .nav button{
    pointer-events:auto!important;
  }

  .sidebar.open .nav button,
  .sidebar.open .side-footer button,
  .sidebar.open button{
    position:relative!important;
    z-index:2147483001!important;
    cursor:pointer!important;
    -webkit-tap-highlight-color:rgba(13,91,210,.16)!important;
  }

  .menu-backdrop{
    z-index:2147482000!important;
    pointer-events:none!important;
  }

  body.mobile-menu-open .menu-backdrop{
    pointer-events:auto!important;
  }

  body.mobile-menu-open .sidebar.open{
    pointer-events:auto!important;
  }

  /* Al abrir el menú, el contenido queda debajo y no recibe toques */
  body.mobile-menu-open .main{
    pointer-events:none!important;
  }

  body.mobile-menu-open .sidebar.open{
    pointer-events:auto!important;
  }
}

function uid(prefix="id"){return prefix+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8)}
function slug(text){return String(text||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")}
function now(){return new Date().toISOString()}
function fmt(date){if(!date)return "—";return new Intl.DateTimeFormat("es-CO",{dateStyle:"medium",timeStyle:"short"}).format(new Date(date))}
function hoursBetween(a,b){if(!a||!b)return 0;return Math.max(0,(new Date(b)-new Date(a))/36e5)}
function escapeHtml(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]))}
function storageKey(table){return "dtc_"+table}
function localList(table){return JSON.parse(localStorage.getItem(storageKey(table))||"[]")}
function localSave(table,rows){localStorage.setItem(storageKey(table),JSON.stringify(rows))}
function normalize(row){return row&&row.payload?{...row.payload,id:row.id,created_at:row.created_at,updated_at:row.updated_at}:row}
function payloadOf(item){const p={...item};delete p.created_at;delete p.updated_at;return p}

let introState={started:false,appReady:false,videoEnded:false,loadError:false};

function updateBootStatus(text){
  const label=document.getElementById("bootStatus");
  if(label&&text)label.textContent=text;
}

function setBootProgress(value){
  const bar=document.getElementById("bootProgressBar");
  if(bar)bar.style.width=Math.max(0,Math.min(100,value))+"%";
}

function stopIntroMedia(){
  const audio=document.getElementById("bootAudio");
  const video=document.getElementById("bootVideo");
  if(audio){try{audio.pause();audio.currentTime=0}catch(e){}}
  if(video){try{video.pause()}catch(e){}}
}

function hideBootLoader(){
  const el=document.getElementById("bootLoader");
  if(!el)return;
  el.classList.add("hidden");
  stopIntroMedia();
  setTimeout(()=>el.remove(),620);
}

function finishIntroWhenReady(){
  if(!introState.started)return;
  if(!introState.videoEnded)return;
  if(!introState.appReady&&!introState.loadError){
    updateBootStatus("La intro terminó. Terminando de preparar contenido...");
    return;
  }
  updateBootStatus("Experiencia lista. Entrando al sistema...");
  setBootProgress(100);
  setTimeout(hideBootLoader,520);
}

async function startCinematicIntro(){
  if(introState.started)return;
  introState.started=true;

  const btn=document.getElementById("bootStartBtn");
  const loading=document.getElementById("bootLoadingBtn");
  const card=document.getElementById("bootCard");
  const video=document.getElementById("bootVideo");
  const audio=document.getElementById("bootAudio");

  btn?.classList.add("hidden");
  loading?.classList.remove("hidden");
  card?.classList.add("running");
  video?.classList.add("playing");

  updateBootStatus("Reproduciendo intro cinematográfica...");
  setBootProgress(4);

  try{
    if(video){
      video.loop=false;
      video.muted=false;
      video.currentTime=0;
      video.addEventListener("timeupdate",()=>{
        if(video.duration&&isFinite(video.duration)){
          setBootProgress((video.currentTime/video.duration)*96);
        }
      });
      video.addEventListener("ended",()=>{
        introState.videoEnded=true;
        setBootProgress(100);
        finishIntroWhenReady();
      },{once:true});
    }

    if(audio){
      audio.currentTime=0;
      audio.volume=.88;
    }

    const videoPromise=video?video.play():Promise.resolve();
    const audioPromise=audio?audio.play():Promise.resolve();
    await Promise.allSettled([videoPromise,audioPromise]);

    const fallbackMs=((video?.duration&&isFinite(video.duration))?video.duration*1000:8500)+900;
    setTimeout(()=>{
      if(!introState.videoEnded){
        introState.videoEnded=true;
        finishIntroWhenReady();
      }
    },fallbackMs);
  }catch(e){
    console.error(e);
    updateBootStatus("No se pudo reproducir la intro completa. Entrando al sistema...");
    introState.videoEnded=true;
    introState.loadError=true;
    finishIntroWhenReady();
  }
}

function prepareIntroStart(){
  const btn=document.getElementById("bootStartBtn");
  const video=document.getElementById("bootVideo");
  const audio=document.getElementById("bootAudio");

  updateBootStatus("Pulsa iniciar para comenzar la intro.");

  try{video?.load()}catch(e){}
  try{audio?.load()}catch(e){}

  btn?.addEventListener("click",startCinematicIntro,{once:true});
}

async function hashPin(pin){const enc=new TextEncoder().encode(String(pin));const buf=await crypto.subtle.digest("SHA-256",enc);return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("")}
async function listRecords(table){if(sb){try{const {data,error}=await sb.from(table).select("*").order("updated_at",{ascending:false});if(!error&&data)return data.map(normalize)}catch(e){}}return localList(table)}
async function saveRecord(table,item){item.updated_at=now();item.created_at=item.created_at||now();if(sb){try{const row={id:item.id,payload:payloadOf(item),created_at:item.created_at,updated_at:item.updated_at};const {data,error}=await sb.from(table).upsert(row).select().single();if(!error&&data)return normalize(data)}catch(e){}}
const rows=localList(table);const ix=rows.findIndex(x=>x.id===item.id);if(ix>=0)rows[ix]=item;else rows.unshift(item);localSave(table,rows);return item}
async function removeRecord(table,id){if(sb){try{await sb.from(table).delete().eq("id",id)}catch(e){}}localSave(table,localList(table).filter(x=>x.id!==id))}

async function filesToAttachments(list){const files=[...(list||[])].slice(0,8);return Promise.all(files.map(file=>new Promise(resolve=>{const r=new FileReader();r.onload=()=>resolve({id:uid("file"),name:file.name,type:file.type||"application/octet-stream",size:file.size||0,data:r.result,uploadedAt:now()});r.readAsDataURL(file)})))}
function attachmentsHtml(items,label){const arr=(items||[]);if(!arr.length)return `<div class="empty">No hay ${label.toLowerCase()} cargados.</div>`;return `<div class="section-title" style="margin-top:18px"><h2>${label}</h2><span>${arr.length} archivo(s)</span></div><div class="attach-list">${arr.map(a=>`<div class="attach-item"><div class="attach-meta"><strong>${escapeHtml(a.name)}</strong><span>${escapeHtml(a.type||'archivo')} · ${humanSize(a.size)}</span></div><div class="attach-actions"><button class="btn ghost small" onclick="downloadAttachment('${a.ticketId}','${a.scope}','${a.id}')">Descargar</button></div></div>`).join("")}</div>`}
function downloadAttachment(ticketId,scope,fileId){const t=state.tickets.find(x=>x.id===ticketId)||state.selectedTicket;if(!t)return popup("Archivo no disponible","No encontré la solicitud asociada al adjunto.",assets.missing);const list=scope==="resolution"?(t.resolutionFiles||[]):(t.attachments||[]);const file=list.find(x=>x.id===fileId);if(!file||!file.data)return popup("Archivo no disponible","El adjunto no está cargado o ya no se encuentra disponible.",assets.missing);const link=document.createElement('a');link.href=file.data;link.download=file.name||'archivo';document.body.appendChild(link);link.click();link.remove()}

async function seed(){
  const safeList=async(table)=>{try{return await listRecords(table)}catch(e){console.warn('No cargó '+table,e);return []}};
  const safeJson=async(url)=>{try{return await fetch(url,{cache:'force-cache'}).then(r=>r.ok?r.json():[])}catch(e){console.warn('No cargó '+url,e);return []}};

  let [users,tickets,aiRows,scores,adv,corpus,intents,templates]=await Promise.all([
    safeList(tables.users),
    safeList(tables.tickets),
    safeList(tables.ai),
    safeList(tables.scores),
    safeJson('ia_nivel1_data/knowledge_seed.json'),
    safeJson('ia_corpus_data/corpus_knowledge.json'),
    safeJson('ia_corpus_data/corpus_intents.json'),
    safeJson('ia_corpus_data/corpus_templates.json')
  ]);

  if(!users.length){
    await Promise.all(defaultUsers.map(u=>saveRecord(tables.users,{id:u.id,...u,created_at:now(),updated_at:now()})));
    users=await safeList(tables.users);
  }

  if(aiRows.length<10){
    await Promise.all(aiKnowledge.map(k=>saveRecord(tables.ai,{id:"base_"+k.id,key:k.keywords.join(","),intent:k.intent,answer:k.answer,createdBy:"Modelo base",route:k.route,active:true,created_at:now(),updated_at:now()})));
    aiRows=await safeList(tables.ai);
  }

  state.users=users;
  state.tickets=tickets;
  state.aiMemories=aiRows;
  state.scores=scores;
  state.advancedKnowledge=(adv||[]).map(x=>({id:x.id,intent:x.intent_id||x.category_id||'general',keywords:x.keywords||[x.question,x.title],answer:x.answer||'',source:'Nivel 1'}));
  state.corpusKnowledge=corpus||[];
  state.corpusIntents=intents||[];
  state.corpusTemplates=templates||[];
}

  const closed=state.tickets.filter(t=>t.status==="Cerrada").length;
  const critical=state.tickets.filter(t=>t.priority==="Crítica"||t.priorityBoost===true).length;
  const accepted=state.tickets.filter(t=>t.acceptedAt).length;
  const withResponse=state.tickets.filter(t=>t.finishedAt).length;

  const avgHours=(()=>{const rows=state.tickets.filter(t=>t.acceptedAt&&t.finishedAt);if(!rows.length)return 0;return Number((rows.reduce((a,t)=>a+hoursBetween(t.acceptedAt,t.finishedAt),0)/rows.length).toFixed(1))})();

><strong>${open}</strong></div><div class="support-mini"><small>Cerradas</small><strong>${closed}</strong></div></div><div class="grid cols-2" style="margin-top:18px"><div class="card"><div class="section-title"><h2>Distribución por estado</h2><span>flujo del servicio</span></div><div class="chart-box"><canvas id="chartStatus"></canvas></div></div><div class="card"><div class="section-title"><h2>Solicitudes por responsable</h2><span>carga operativa</span></div><div class="chart-box"><canvas id="chartAssignee"></canvas></div></div></div><div class="card" style="margin-top:18px"><div class="section-title"><h2>Kanban operativo</h2><span>${state.tickets.length} solicitudes</span></div><div class="kanban">${statusFlow.map(st=>`<div class="lane"><h3>${escapeHtml(st)}</h3>${state.tickets.filter(t=>t.status===st).slice(0,6).map(t=>`<div class="mini-ticket" onclick="openTicket('${t.id}')"><strong>${escapeHtml(t.code)} · ${escapeHtml(t.title)}</strong><p>${escapeHtml(t.requesterArea||'Sin área')} · ${escapeHtml(userName(t.assignedTo))}</p></div>`).join("")||`<div class="empty">Sin solicitudes</div>`}</div>`).join("")}</div></div>`
}

function filteredTickets(){
  return state.tickets.filter(t=>{
    const q=state.filters.q.trim().toLowerCase();
    const matchQ=!q || [t.code,t.title,t.description,t.requesterName,t.requesterArea,userName(t.assignedTo)].join(" ").toLowerCase().includes(q);
    const matchStatus=state.filters.status==="Todos" || t.status===state.filters.status;
    const matchAssignee=state.filters.assignee==="Todos" || t.assignedTo===state.filters.assignee;
    const matchPriority=state.filters.priority==="Todos" || t.priority===state.filters.priority;
    return matchQ && matchStatus && matchAssignee && matchPriority;
  })
}

async function submitTicket(e){
  e.preventDefault();
  const fd=new FormData(e.target);
  const attachments=await filesToAttachments(document.getElementById('ticketAttachments')?.files);
  const ticketId=uid('ticket');
  const priorityCode=String(fd.get('priorityCode')||'').trim().toUpperCase();
  let boostResult=null;
  if(priorityCode){
    boostResult=await redeemPriorityCode(priorityCode,ticketId);
    if(!boostResult.ok){popup('Código de prioridad no válido',boostResult.message||'El código no existe, ya fue usado o no está activo.',assets.missing);return}
  }
  const ticket={
    id:ticketId,
    code:'DT-'+String(maxTicketCode()+1).padStart(4,'0'),
    requesterName:fd.get('requesterName'),
    requesterEmail:fd.get('requesterEmail'),
    requesterArea:fd.get('requesterArea'),
    assignedTo:fd.get('assignedTo'),
    category:fd.get('category'),
    priority:fd.get('priority'),
    modality:fd.get('modality'),
    title:fd.get('title'),
    description:fd.get('description'),
    evidence:fd.get('evidence'),
    attachments:(attachments||[]).map(a=>({...a,ticketId:'',scope:'general'})),
    resolutionFiles:[],
    status:'Enviada',
    createdBy:state.user.id,
    acceptedAt:null,
    finishedAt:null,
    extendedReason:'',
    chat:[{by:state.user.name,text:'Solicitud radicada.',at:now()}],
    timeline:[{label:'Radicación',text:'Solicitud enviada al responsable.',at:now()}],
    created_at:now(),updated_at:now()
  };
  if(boostResult?.ok){
    ticket.priority='Crítica';
    ticket.priorityBoost=true;
    ticket.priorityCode=priorityCode;
    ticket.priorityBoostCost=boostResult.cost;
    ticket.timeline.push({label:'Prioridad por monedas',text:`Código ${priorityCode} aplicado. La solicitud sube por prioridad de monedas del ranking.`,at:now()});
    ticket.chat.push({by:'Sistema de monedas',text:`Se aplicó código de prioridad ${priorityCode}. Esta solicitud entra por encima de la fila normal.`,at:now()});
  }
  ticket.attachments=ticket.attachments.map(a=>({...a,ticketId:ticket.id,scope:'general'}));
  await saveRecord(tables.tickets,ticket);
  state.tickets=await listRecords(tables.tickets);
  playSound(sounds.created);
  popup('Solicitud enviada',`Tu código es ${ticket.code}. Guárdalo para consultar el estado. ${ticket.priorityBoost?'Se aplicó prioridad por monedas. ':''}Ya está en la bandeja de ${userName(ticket.assignedTo)}.`,randomSentGif());
  if(window.confetti)confetti({particleCount:90,spread:70,origin:{y:.76}});
  e.target.reset();
  state.selectedTicketId=ticket.id;state.selectedTicket=ticket;state.view='detail';renderApp()
}

function lookupTicket(){
  const q=(document.getElementById('lookupCode')?.value||'').trim().toLowerCase();
  const t=state.tickets.find(x=>(x.code||'').toLowerCase()===q || x.id.toLowerCase()===q);
  if(!t)return popup('No lo encontré','Ese código no coincide. Revisa si escribiste completo el consecutivo, por ejemplo DT-0001.',assets.missing);
  openTicket(t.id,true)
}

function openTicket(id,fromLookup=false){
  const t=state.tickets.find(x=>x.id===id);
  if(!t)return popup('No encontré la solicitud','La información no coincide con ningún ticket activo.',assets.missing);
  state.selectedTicketId=id;state.selectedTicket=t;state.view='detail';renderApp();
  const fresh=state.tickets.find(x=>x.id===id)||t;state.selectedTicket=fresh;
  if(fromLookup||state.user?.role==='Solicitante'){
    const waiting=['Enviada','Sin aceptar','Espera ampliada'];
    if((!fresh.acceptedAt) && ['Enviada','Sin aceptar'].includes(fresh.status) && ageHours(fresh)>=3){playSound(sounds.waiting);popup('Tu solicitud sigue pendiente de aceptación',`El radicado ${fresh.code} lleva más de 3 horas sin ser aceptado. Ya puedes escalar o insistir con evidencia adicional.`,assets.sad)}
    else if(waiting.includes(fresh.status)){playSound(sounds.waiting);popup('Tu solicitud sigue en espera',`El radicado ${fresh.code} todavía está en gestión. Revisa el comentario más reciente y el responsable asignado.`,fresh.status==='Espera ampliada'?assets.extend:assets.working)}
    else if(fresh.modality==='Documental'&&fresh.status==='En proceso'){popup('Documento en proceso','Esta solicitud no requiere presencialidad inmediata. El responsable está elaborando o revisando el entregable.',assets.document)}
    else if(['Resuelta','Cerrada'].includes(fresh.status)){playSound(sounds.ready);popup('¡Listo! Ya está tu solicitud',`El radicado ${fresh.code} ya tiene resultado. Revisa el cierre, los adjuntos y la evidencia cargada.`,assets.done)}
    else popup('Solicitud encontrada',`Abrimos el detalle completo del radicado ${fresh.code}.`,assets.fun)
  }
}

function ticketActions(t){
  const backView=isInternal()?'tickets':'create';
  let actions=`<button class="btn ghost" onclick="setView('${backView}')">Volver</button>`;
  if(isInternal() && t.assignedTo===state.user.id && ['Enviada','Sin aceptar'].includes(t.status))actions+=`<button class="btn ok" onclick="acceptTicket('${t.id}')">Aceptar</button>`;
  if(isInternal() && t.assignedTo===state.user.id && ['En proceso','Espera ampliada'].includes(t.status))actions+=`<button class="btn gold" onclick="extendTicket('${t.id}')">Ampliar espera</button><button class="btn ok" onclick="resolveTicket('${t.id}')">Resolver</button>`;
  if((hasLead() || t.createdBy===state.user.id) && t.status==='Resuelta')actions+=`<button class="btn primary" onclick="closeTicket('${t.id}')">Cerrar y notificar</button>`;
  return actions
}

async function sendChat(id){
  const msg=document.getElementById('chatMsg')?.value.trim();
  if(!msg)return popup('Falta el mensaje','Escribe una actualización o comentario antes de enviar.',assets.missing);
  const t=state.tickets.find(x=>x.id===id);if(!t)return;
  const author = state.user?.role==='Solicitante' ? (t.requesterName||state.user.name||'Solicitante') : state.user.name;
  t.chat=t.chat||[];t.chat.push({by:author,text:msg,at:now(),role:state.user?.role||'Solicitante'});
  t.timeline=t.timeline||[];t.timeline.push({label:'Mensaje',text:(state.user?.role==='Solicitante'?'El solicitante envió un mensaje al responsable.':'Se agregó un mensaje a la solicitud.'),at:now()});
  await saveRecord(tables.tickets,t);state.tickets=await listRecords(tables.tickets);state.selectedTicketId=id;state.selectedTicket=state.tickets.find(x=>x.id===id);renderView();toast('Mensaje enviado')
}

async function updateTicket(ticket,label,text,newStatus){

  await saveRecord(tables.tickets,ticket);state.tickets=await listRecords(tables.tickets);state.selectedTicket=state.tickets.find(x=>x.id===ticket.id);renderView()
}

async function extendTicket(id){const t=state.tickets.find(x=>x.id===id);if(!t)return;const {value:reason}=await Swal.fire({title:'Ampliar espera',input:'textarea',inputLabel:'Motivo de la ampliación',inputPlaceholder:'Explica por qué se amplía la espera y qué sigue.',showCancelButton:true,confirmButtonText:'Guardar ampliación',confirmButtonColor:'#0d5bd2'});if(!reason)return;t.extendedReason=reason;t.chat=t.chat||[];t.chat.push({by:state.user.name,text:'Se amplía la espera: '+reason,at:now()});await updateTicket(t,'Espera ampliada',reason,'Espera ampliada');toast('Espera ampliada')}
async function resolveTicket(id){const t=state.tickets.find(x=>x.id===id);if(!t)return;const result=await Swal.fire({title:'Resolver solicitud',html:'<div class="field" style="text-align:left"><label>Comentario de cierre</label><textarea id="swal-close-comment" class="swal2-textarea" placeholder="Describe lo que se realizó y lo que entregas"></textarea></div><div class="field" style="text-align:left"><label>Adjuntar respuesta / evidencia</label><input id="swal-close-files" type="file" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.png,.jpg,.jpeg,.webp,.txt"></div>',showCancelButton:true,confirmButtonText:'Marcar resuelta',confirmButtonColor:'#0d5bd2',preConfirm:async()=>({comment:document.getElementById('swal-close-comment').value,files:await filesToAttachments(document.getElementById('swal-close-files').files)})});if(!result.value)return;t.finishedAt=now();t.resolutionFiles=[...(t.resolutionFiles||[]),...(result.value.files||[]).map(a=>({...a,ticketId:t.id,scope:'resolution'}))];t.chat=t.chat||[];t.chat.push({by:state.user.name,text:result.value.comment||'Solicitud resuelta. Queda lista para validación y cierre.',at:now()});await updateTicket(t,'Resolución',result.value.comment||'Responsable marcó la solicitud como resuelta.','Resuelta');await autoLearn('cierre '+t.category,`Caso resuelto: ${t.title}. Aprendizaje: ${t.description}`);toast('Solicitud resuelta')}

function countBy(list,key,mapper){const out={};for(const item of list){const raw=mapper?mapper(item[key]):item[key];const k=raw||'Sin dato';out[k]=(out[k]||0)+1}return out}
function avgTimeByResponsible(){const grouped={};for(const t of state.tickets){const key=userName(t.assignedTo);grouped[key]=grouped[key]||{sum:0,count:0};if(t.acceptedAt&&t.finishedAt){grouped[key].sum+=hoursBetween(t.acceptedAt,t.finishedAt);grouped[key].count++}}
return Object.fromEntries(Object.entries(grouped).map(([k,v])=>[k,Number((v.count?v.sum/v.count:0).toFixed(1))]))}

function normalizeTextAI(text){return String(text||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase()}
function tokensAI(text){return normalizeTextAI(text).split(/[^a-z0-9]+/).filter(Boolean)}
function overlapScore(a,b){const A=new Set(tokensAI(a));const B=new Set(tokensAI(b));if(!A.size||!B.size)return 0;let i=0;A.forEach(x=>{if(B.has(x))i++});return i/Math.max(A.size,B.size)}
function keywordScore(q,keywords){if(!keywords?.length)return 0;const clean=normalizeTextAI(q);return keywords.reduce((acc,k)=>acc+(clean.includes(normalizeTextAI(k))?1:0),0)/keywords.length}
function inferIntent(q){const clean=normalizeTextAI(q);const rules=[{intent:"radicacion",rx:/crear|radicar|ticket|solicitud|redactar|registrar/},{intent:"consulta",rx:/radicado|codigo|estado|buscar|solicitud dt/},{intent:"prioridad",rx:/urgente|critica|critica|prioridad/},{intent:"tiempos",rx:/espera|tiempo|demora|plazo/},{intent:"redaccion",rx:/mejorar texto|resumir|mas claro|menos largo|redactar/}];return (rules.find(r=>r.rx.test(clean))||{intent:"general"}).intent}
function rankKnowledge(q){const intent=inferIntent(q);const memoryRows=state.aiMemories.map(m=>({id:m.id,intent:m.intent||'general',keywords:String(m.key||'').split(/[,;]+/),answer:m.answer||'',source:'Memoria'}));const all=[...aiKnowledge.map(k=>({...k,source:'Base'})),...(state.corpusKnowledge||[]).map(k=>({...k,source:k.source||'Corpus conversacional',keywords:k.keywords||[k.question,k.title],intent:k.intent||'general',answer:k.answer||''})),...(state.advancedKnowledge||[]),...memoryRows];return all.map(k=>{const s1=keywordScore(q,k.keywords||[]);const s2=overlapScore(q,(k.keywords||[]).join(' ')+' '+(k.answer||''));const s3=(k.intent===intent?1:0);return {...k,score:.48*s1+.32*s2+.20*s3}}).sort((a,b)=>b.score-a.score)}
function findTicketAI(q){const clean=normalizeTextAI(q);const code=(clean.match(/dt-?\s*\d{1,6}/)||[])[0];if(code){const compact=code.replace(/\s+/g,'').toUpperCase().replace('DT','DT-');const t=state.tickets.find(x=>normalizeTextAI(x.code)===normalizeTextAI(compact)||normalizeTextAI(x.code).replace('-','')===normalizeTextAI(compact).replace('-',''));if(t)return t}return null}
function suggestAssignee(category,priority){const jefe=state.users.find(u=>u.role==='Jefe general');const audit=state.users.find(u=>u.role.includes('auditoría')||u.role.includes('auditoria'));const analysts=state.users.filter(u=>u.role==='Analista de calidad');if(priority==='Crítica'&&jefe)return jefe.id;if(['Auditoría','Riesgo/Hallazgo'].includes(category)&&audit)return audit.id;return (analysts[0]||jefe||audit||state.users[0]||{}).id||''}
function makeTitleFromText(text,category){const clean=String(text||'').replace(/\s+/g,' ').trim();let first=clean.split(/[\.\n]/)[0].slice(0,86);if(first.length<12)first=`Solicitud de ${category.toLowerCase()}`;return first.charAt(0).toUpperCase()+first.slice(1)}
function draftTicketFromText(text){const clean=normalizeTextAI(text);const category=/auditoria|hallazgo|no conformidad/.test(clean)?'Auditoría':/indicador|kpi|dashboard|grafica|medir/.test(clean)?'Indicador/KPI':/capacitacion|induccion|entrenamiento/.test(clean)?'Capacitación':/riesgo|control/.test(clean)?'Riesgo/Hallazgo':/documento|formato|pdf|acta|matriz/.test(clean)?'Documento':/procedimiento|proceso|flujo|manual/.test(clean)?'Procedimiento':/mejora|optimizar/.test(clean)?'Mejora continua':'Consulta general';const priority=/urgente|critica|auditoria|vencido|bloquea|gerencia/.test(clean)?'Alta':/simple|consulta|cuando puedan|baja/.test(clean)?'Baja':'Media';const modality=/visita|presencial|campo|reunion|acompanamiento/.test(clean)?'Presencial':/documento|formato|pdf|acta|matriz|procedimiento/.test(clean)?'Documental':'Mixta';const title=makeTitleFromText(text,category);const description=`Necesidad identificada: ${text.trim()}\n\nResultado esperado: recibir orientación, ajuste, revisión o soporte del área de Calidad y Mejora Continua según el alcance de la solicitud.\n\nInformación mínima sugerida: proceso afectado, evidencia disponible, plazo esperado, impacto y persona de contacto.\n\nCriterio de cierre: dejar evidencia del análisis realizado, respuesta entregada y validación del solicitante.`;return {category,priority,modality,title,description,assignedTo:suggestAssignee(category,priority)}}
function smallTalkResponse(q){const clean=normalizeTextAI(q).trim();if(/^(hola|holi|hello|buenas|buenos dias|buen dia|buenas tardes|buenas noches)$/.test(clean))return "¡Hola! 👋 Soy la IA del Dream Team de Calidad. Puedo conversar contigo normal, ayudarte a crear solicitudes, consultar radicados y resolver dudas del proceso.";if(/como estas|como vas|que tal|todo bien/.test(clean))return "Voy muy bien, gracias. Estoy lista para conversar, orientarte y ayudarte con solicitudes, calidad, auditoría, procedimientos o mejoras.";if(/quien eres|que eres|como te llamas/.test(clean))return "Soy la IA de la Mesa de Ayuda de Calidad y Mejoramiento Continuo. Converso contigo, ayudo a redactar solicitudes, explico estados, apoyo consultas y aprendo con la información del sistema.";if(/gracias|muchas gracias|te agradezco/.test(clean))return "¡Con gusto! Si quieres, también puedo ayudarte a redactar una solicitud o explicarte cualquier estado del proceso.";if(/adios|chao|nos vemos|hasta luego/.test(clean))return "¡Nos vemos! Cuando quieras vuelves y te ayudo con solicitudes, radicados o cualquier duda.";return ''}
function generalConversation(q){const clean=normalizeTextAI(q);if(/que puedes hacer|en que me ayudas|para que sirves/.test(clean))return "Puedo mantener conversación normal, ayudarte a crear solicitudes claras, sugerir prioridad y responsable, consultar radicados, resumir textos, explicar KPIs, orientar sobre auditoría y aprender de documentos y memorias.";if(/ayudame|necesito ayuda/.test(clean))return "Claro. Cuéntame qué necesitas y yo te ayudo. Si es una solicitud, dime el problema, el área de origen, el impacto y si tienes evidencia. Si es una duda, hazme la pregunta en lenguaje normal.";return ''}
function corpusExactResponse(q){const clean=normalizeTextAI(q);const rows=state.corpusKnowledge||[];let best=null;let score=0;for(const row of rows){const question=normalizeTextAI(row.question||row.title||'');const keys=(row.keywords||[]).join(' ');let s1=question&&clean===question?1:0;let s2=keywordScore(q,row.keywords||[]);let s3=overlapScore(q,(row.question||'')+' '+keys);const total=Math.max(s1,.55*s2+.45*s3);if(total>score){score=total;best=row}}return score>.46&&best?best.answer:''}

function extractTicketCode(q){const m=normalizeTextAI(q).match(/dt-?\s*\d{1,6}/);if(!m)return '';return m[0].replace(/\s+/g,'').toUpperCase().replace(/^DT(?!-)/,'DT-')}
function getTicketByCode(code){if(!code)return null;return state.tickets.find(t=>normalizeTextAI(t.code)===normalizeTextAI(code)||normalizeTextAI(t.code).replace('-','')===normalizeTextAI(code).replace('-',''))}
function extractMessageForTicket(q,code){let text=String(q||'');if(code)text=text.replace(new RegExp(code.replace('-','-?\\\\s*'),'i'),'');text=text.replace(/^(enviar|envia|manda|mandar|decirle|dile|mensaje|responder|escribir|escribe|preguntar|pregunta|quiero hablar|hablar con responsable|al responsable|a responsable|en la solicitud|del ticket|del radicado)/ig,'').replace(/[:：]/g,' ').trim();return text}
async function executeAICommand(q){const clean=normalizeTextAI(q);const code=extractTicketCode(q);const ticket=getTicketByCode(code);if(ticket&&/(consultar|buscar|ver|abrir|estado|seguimiento|radicado|ticket)/.test(clean)){state.pendingTicketId=ticket.id;setAIActions([aiAction('Abrir solicitud','openTicket',{id:ticket.id}),aiAction('Enviar mensaje al responsable','messageTicket',{id:ticket.id}),aiAction('Crear otra solicitud','openCreate')]);return {answer:`Encontré el radicado ${ticket.code}.\\n\\nEstado: ${ticket.status}.\\nResponsable: ${userName(ticket.assignedTo)}.\\nÚltima actualización: ${fmt(ticket.updated_at)}.\\n\\nPuedes abrirlo, revisar la trazabilidad o enviarle un mensaje directo al responsable.`,learn:false,actions:state.aiActions}}if(ticket&&/(mensaje|decir|decirle|dile|responder|comentario|preguntar|pregunta|escribe|enviar|envia|manda)/.test(clean)){const msg=extractMessageForTicket(q,ticket.code);if(msg.length>5){ticket.chat=ticket.chat||[];ticket.chat.push({by:state.user?.role==='Solicitante'?(ticket.requesterName||'Solicitante'):state.user.name,text:msg,at:now(),role:state.user?.role||'Solicitante',via:'IA'});ticket.timeline=ticket.timeline||[];ticket.timeline.push({label:'Mensaje vía IA',text:'La IA registró un mensaje para el responsable.',at:now()});await saveRecord(tables.tickets,ticket);state.tickets=await listRecords(tables.tickets);state.pendingTicketId=ticket.id;setAIActions([aiAction('Abrir solicitud','openTicket',{id:ticket.id}),aiAction('Enviar otro mensaje','messageTicket',{id:ticket.id})]);return {answer:`Listo. Dejé tu mensaje en el chat del radicado ${ticket.code} para ${userName(ticket.assignedTo)}.`,learn:true,actions:state.aiActions}}setAIActions([aiAction('Abrir solicitud','openTicket',{id:ticket.id}),aiAction('Escribir mensaje','messageTicket',{id:ticket.id})]);return {answer:`Sí. Puedo ayudarte a hablar con el responsable del radicado ${ticket.code}. Escríbeme el mensaje así:\\n\\n“Enviar mensaje ${ticket.code}: [tu mensaje]”`,learn:false,actions:state.aiActions}}return null}
function conversationalPatternGuide(){return `Responderé como asistente operativo: claro, directo, con pasos y sin etiquetas técnicas. Si falta información, pediré máximo tres datos. Si se puede hacer una acción en la app, mostraré botones para ejecutarla.`}
function guidedOptionsForIntent(intent){const base=[aiAction('Crear solicitud','openCreate'),aiAction('Consultar radicado','focusLookup'),aiAction('Juegos IA','openGame')];if(intent==='radicacion')return [aiAction('Usar borrador en formulario','useDraft'),aiAction('Crear solicitud manual','openCreate'),aiAction('Hablar con IA','focusAI')];if(intent==='consulta')return [aiAction('Ir a consulta por radicado','focusLookup'),aiAction('Crear nueva solicitud','openCreate')];if(intent==='tiempos')return [aiAction('Consultar radicado','focusLookup'),aiAction('Enviar mensaje al responsable','messageLastTicket')];return base}
function populateAIDraftForm(){if(!state.pendingDraft)return;const form=document.getElementById('ticketForm');if(!form)return;const d=state.pendingDraft;form.elements['category'].value=d.category||'Consulta general';form.elements['priority'].value=d.priority||'Media';form.elements['modality'].value=d.modality||'Mixta';if(d.assignedTo)form.elements['assignedTo'].value=d.assignedTo;form.elements['title'].value=d.title||'';form.elements['description'].value=d.description||'';toast('Borrador IA cargado en el formulario')}
async function runAIAction(index){const a=state.aiActions[index];if(!a)return;const action=a.action;if(action==='openCreate'||action==='useDraft'){setView('create');return}if(action==='focusLookup'){setView('create');setTimeout(()=>document.getElementById('lookupCode')?.focus(),80);return}if(action==='openGame'){setView('game');return}if(action==='focusAI'){setView('ai');return}if(action==='openTicket'){openTicket(a.payload?.id||state.pendingTicketId,true);return}if(action==='messageTicket'||action==='messageLastTicket'){const id=a.payload?.id||state.pendingTicketId||state.selectedTicketId;if(id){openTicket(id,true);setTimeout(()=>document.getElementById('chatMsg')?.focus(),120)}else{state.aiHistory.push({me:false,text:'Dime primero el radicado. Ejemplo: “Enviar mensaje DT-0001: adjunto nueva evidencia”.'});renderView()}return}}
function composeAI(q){const talk=smallTalkResponse(q)||generalConversation(q);if(talk){const actions=[aiAction('Crear solicitud','openCreate'),aiAction('Consultar radicado','focusLookup'),aiAction('Ver juegos IA','openGame')];return {answer:`${talk}

${conversationalPatternGuide()}`,learn:false,actions}}const exact=corpusExactResponse(q);if(exact){const actions=guidedOptionsForIntent(inferIntent(q));return {answer:`${exact}

¿Quieres que haga el siguiente paso contigo?`,learn:false,actions}}const ticket=findTicketAI(q);if(ticket){const actions=[aiAction('Abrir solicitud','openTicket',{id:ticket.id}),aiAction('Enviar mensaje al responsable','messageTicket',{id:ticket.id}),aiAction('Crear otra solicitud','openCreate')];return {answer:`Encontré una solicitud relacionada: ${ticket.code} · ${ticket.title}.

Puedes abrirla o enviar un mensaje directo al responsable.`,learn:false,actions}}if(/crear|radicar|ticket|solicitud|redactar|registrar/i.test(normalizeTextAI(q))){const d=draftTicketFromText(q);const actions=[aiAction('Usar borrador en formulario','useDraft'),aiAction('Consultar radicado','focusLookup'),aiAction('Seguir conversando','focusAI')];return {answer:`Claro. Te dejo un borrador listo para radicar:

${d.description}

Puedo cargarlo en el formulario para que solo revises y envíes.`,learn:true,draft:d,actions}}const ranked=rankKnowledge(q);const top=ranked[0];if(top&&top.score>.12){const actions=guidedOptionsForIntent(inferIntent(q));return {answer:`${top.answer}

Puedo ayudarte a convertir esto en solicitud, explicarlo en pasos o llevarte al módulo correcto.`,learn:top.score<.32,actions}}const d=draftTicketFromText(q);const actions=[aiAction('Convertir en solicitud','useDraft'),aiAction('Consultar radicado','focusLookup'),aiAction('Hablar con responsable','messageLastTicket')];return {answer:`Te entendí de forma general. Para hacerlo funcional necesito aterrizarlo.

Puedo ayudarte a:

function aiHtml(){return `<div class="ai-layout"><div class="card"><div class="section-title"><h2>Chatbot de Calidad</h2><span>${AI_ENGINE_VERSION} · ${state.aiMemories.length} memorias · ${state.advancedKnowledge.length} semillas N1 · ${state.corpusKnowledge.length} corpus</span></div><div class="ai-mode-note">Modo asistente operativo: conversa normal, guía paso a paso, crea borradores, consulta radicados y permite escribir al responsable sin tener que explorar toda la app.</div><div class="ai-chat" id="aiChat" style="margin-top:12px">${state.aiHistory.map(m=>`<div class="${m.me?'human':'bot'}">${escapeHtml(m.text)}</div>`).join('')||`<div class="bot">Hola. Soy la IA del Dream Team de Calidad. Puedo conversar contigo normal, ayudarte a crear solicitudes, consultar radicados, redactar respuestas, clasificar prioridades, explicar KPIs, ordenar procedimientos, hablar con responsables y aprender de documentos.</div>`}</div>${aiActionsHtml()}<div class="form" style="margin-top:12px"><div class="field"><label>Mensaje u orden</label><input id="aiPrompt" placeholder="Ej. enviar mensaje DT-0001: adjunto evidencia nueva"></div><button class="btn primary" onclick="askAI()">Conversar / ejecutar</button></div></div><div class="card"><div class="section-title"><h2>Acciones rápidas</h2><span>sin explorar la app</span></div>${aiQuickOptionsHtml()}<div class="section-title" style="margin-top:18px"><h2>Entrenar IA</h2><span>memoria + documentos + tickets + juegos</span></div><div class="form"><div class="field"><label>Subir documento</label><input id="knowledgeFile" type="file" accept=".pdf,.txt,.csv,.md,.json,.doc,.docx"></div><button class="btn ghost" onclick="learnFromFile()">Leer y aprender</button><div class="field"><label>Pregunta o palabra clave</label><input id="learnKey" placeholder="Ej. remanente, auditoría, procedimiento"></div><div class="field"><label>Respuesta esperada</label><textarea id="learnAnswer" placeholder="Escribe cómo debe responder el bot"></textarea></div><button class="btn gold" onclick="manualLearn()">Guardar memoria</button><div class="empty">La IA usa corpus conversacional, memorias, tickets y acciones guiadas. Ya no muestra etiquetas técnicas al usuario.</div></div></div></div>`}
async function askAI(){const input=document.getElementById('aiPrompt');const q=input.value.trim();if(!q)return;state.aiHistory.push({me:true,text:q});let result=await executeAICommand(q);if(!result)result=composeAI(q);state.aiHistory.push({me:false,text:result.answer});state.aiActions=result.actions||[];if(result.draft)state.pendingDraft=result.draft;if(result.learn&&q.length>20)await autoLearn('interaccion',`Pregunta frecuente: ${q}. Respuesta útil: ${result.answer.slice(0,900)}`);input.value='';renderView();const chat=document.getElementById('aiChat');setTimeout(()=>{if(chat)chat.scrollTop=chat.scrollHeight},40)}
function generateTicketDraft(){const idea=document.getElementById('draftIdea')?.value.trim();if(!idea)return popup('Falta la idea','Escribe la necesidad en lenguaje normal para que la IA arme el borrador.',assets.missing);const d=draftTicketFromText(idea);const form=document.getElementById('ticketForm');if(!form)return;form.elements['category'].value=d.category;form.elements['priority'].value=d.priority;form.elements['modality'].value=d.modality;if(d.assignedTo)form.elements['assignedTo'].value=d.assignedTo;form.elements['title'].value=d.title;form.elements['description'].value=d.description;popup('Borrador creado','La IA completó asunto, categoría, prioridad, modalidad, descripción y responsable sugerido. Revisa los datos y envía la solicitud.',assets.sent[0]);autoLearn('borrador solicitud',`Idea convertida en solicitud. Asunto: ${d.title}. Categoría: ${d.category}. Prioridad: ${d.priority}.`)}
async function autoLearn(key,answer){const item={id:uid('mem'),key,answer,intent:'memoria',createdBy:state.user?.name||'Sistema',created_at:now(),updated_at:now(),active:true};await saveRecord(tables.ai,item);state.aiMemories=await listRecords(tables.ai)}
async function manualLearn(){const key=document.getElementById('learnKey').value.trim();const answer=document.getElementById('learnAnswer').value.trim();if(!key||!answer)return popup('Falta información','Agrega una palabra clave y la respuesta esperada para entrenar la IA.',assets.missing);await autoLearn(key,answer);document.getElementById('learnKey').value='';document.getElementById('learnAnswer').value='';toast('Memoria guardada');renderView()}
async function readPdf(file){if(!window.pdfjsLib)return '';const buf=await file.arrayBuffer();const pdf=await window.pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;let out='';for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const content=await page.getTextContent();out+=content.items.map(it=>it.str).join(' ')+'\n'}return out}
async function learnFromFile(){const file=document.getElementById('knowledgeFile').files[0];if(!file)return popup('No hay archivo','Selecciona un PDF, TXT, CSV, JSON o Markdown para alimentar la base de conocimiento.',assets.missing);let text='';if(file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf'))text=await readPdf(file);else text=await file.text();const compact=text.replace(/\s+/g,' ').trim().slice(0,4200);if(!compact)return popup('Archivo sin texto','No pude extraer texto útil del documento.',assets.missing);await autoLearn(file.name,`Aprendizaje desde documento ${file.name}: ${compact}`);popup('Documento leído','La IA incorporó el contenido del archivo a su base de respuestas internas.',assets.document);renderView()}

/* =========================================================
   IA MAX - Motor conversacional local con similitud matemática
   No usa servicios externos. Combina:
   - conversación normal
   - extracción de datos para radicación
   - cosine similarity
   - Jaccard
   - Dice coefficient
   - similitud por keywords
   - memoria Supabase + corpus + tickets
   ========================================================= */
const AI_MAX_VERSION="IA Max · motor matemático conversacional v4.0";

const aiStopWords=new Set("a al algo algun alguna algunas algunos ante antes aqui asi aun aunque bajo bien cada como con contra cual cuando de del desde donde dos el ella ello ellos en entre era eran es esa esas ese eso esos esta estaba estado estan estar estas este esto estos fue fueron ha hace hacen hacer hacia hay la las le les lo los mas me mi mis muy no nos o para pero por porque que quien se sea segun ser si sin sobre solo son su sus te tiene tienen todo todos tu un una unas uno unos y ya".split(" "));

function aiCleanText(text){
  return normalizeTextAI(String(text||""))
    .replace(/[^a-z0-9ñáéíóúü\s-]/gi," ")
    .replace(/\s+/g," ")
    .trim();
}
function aiTokens(text){
  return aiCleanText(text).split(/\s+/).filter(t=>t&&t.length>2&&!aiStopWords.has(t));
}
function aiTermFreq(tokens){
  const m={};tokens.forEach(t=>m[t]=(m[t]||0)+1);return m;
}
function aiCosine(a,b){
  const A=aiTermFreq(aiTokens(a)),B=aiTermFreq(aiTokens(b));
  const keys=new Set([...Object.keys(A),...Object.keys(B)]);
  let dot=0,na=0,nb=0;
  keys.forEach(k=>{dot+=(A[k]||0)*(B[k]||0);na+=(A[k]||0)**2;nb+=(B[k]||0)**2});
  return !na||!nb?0:dot/(Math.sqrt(na)*Math.sqrt(nb));
}
function aiJaccard(a,b){
  const A=new Set(aiTokens(a)),B=new Set(aiTokens(b));
  if(!A.size||!B.size)return 0;
  let inter=0;A.forEach(x=>{if(B.has(x))inter++});
  return inter/(A.size+B.size-inter);
}
function aiDice(a,b){
  const A=new Set(aiTokens(a)),B=new Set(aiTokens(b));
  if(!A.size||!B.size)return 0;
  let inter=0;A.forEach(x=>{if(B.has(x))inter++});
  return (2*inter)/(A.size+B.size);
}
function aiKeywordBoost(q,keys=[]){
  const qt=aiTokens(q);
  const keyTokens=aiTokens(Array.isArray(keys)?keys.join(" "):keys);
  if(!qt.length||!keyTokens.length)return 0;
  const K=new Set(keyTokens);let hit=0;
  qt.forEach(t=>{if(K.has(t))hit++});
  return Math.min(1,hit/Math.max(2,Math.min(qt.length,keyTokens.length)));
}
function aiPhraseBoost(q,doc){
  const clean=aiCleanText(q),d=aiCleanText(doc);
  if(!clean||!d)return 0;
  if(d.includes(clean)||clean.includes(d))return .38;
  const parts=clean.split(" ").filter(x=>x.length>4);
  let hits=0;parts.forEach(p=>{if(d.includes(p))hits++});
  return parts.length?Math.min(.22,hits/parts.length*.22):0;
}
function aiConfidenceLabel(score){
  if(score>=.56)return "alta";
  if(score>=.34)return "media";
  if(score>=.20)return "baja útil";
  return "insuficiente";
}
function aiKnowledgePool(){
  const rows=[];
  (aiKnowledge||[]).forEach(x=>rows.push({
    source:"base",
    intent:x.intent||"general",
    title:x.id||x.intent||"Conocimiento base",
    question:(x.keywords||[]).join(" "),
    keywords:x.keywords||[],
    answer:x.answer||"",
    weight:.95
  }));
  (state.aiMemories||[]).filter(x=>x.active!==false).forEach(x=>rows.push({
    source:"memoria",
    intent:x.intent||"memoria",
    title:x.key||x.id||"Memoria",
    question:x.key||"",
    keywords:String(x.key||"").split(","),
    answer:x.answer||"",
    weight:1.05
  }));
  (state.advancedKnowledge||[]).forEach(x=>rows.push({
    source:"nivel1",
    intent:x.intent||"general",
    title:x.id||"Semilla nivel 1",
    question:(x.keywords||[]).join(" "),
    keywords:x.keywords||[],
    answer:x.answer||"",
    weight:.92
  }));
  (state.corpusKnowledge||[]).forEach(x=>rows.push({
    source:"corpus",
    intent:x.intent_id||x.category_id||x.intent||"corpus",
    title:x.title||x.question||"Corpus",
    question:x.question||x.title||"",
    keywords:x.keywords||[],
    answer:x.answer||"",
    weight:1
  }));
  (state.tickets||[]).slice(-120).forEach(t=>rows.push({
    source:"tickets",
    intent:"historial_tickets",
    title:t.code+" "+t.title,
    question:[t.code,t.title,t.category,t.priority,t.status,t.requesterArea,userName(t.assignedTo)].join(" "),
    keywords:[t.code,t.category,t.priority,t.status,t.requesterArea,userName(t.assignedTo)],
    answer:`Solicitud histórica ${t.code}: ${t.title}. Estado ${t.status}. Categoría ${t.category}. Prioridad ${t.priority}. Responsable ${userName(t.assignedTo)}. Descripción: ${String(t.description||"").slice(0,650)}`,
    weight:.72
  }));
  return rows.filter(r=>String(r.answer||r.question||"").trim());
}
function aiRankKnowledge(q){
  const query=String(q||"");
  return aiKnowledgePool().map(r=>{
    const doc=[r.title,r.question,(r.keywords||[]).join(" "),r.answer,r.intent,r.source].join(" ");
    const score=(
      aiCosine(query,doc)*.38+
      aiJaccard(query,doc)*.20+
      aiDice(query,doc)*.18+
      aiKeywordBoost(query,r.keywords)*.16+
      aiPhraseBoost(query,doc)*.08
    )*(r.weight||1);
    return {...r,score:Number(score.toFixed(4))};
  }).sort((a,b)=>b.score-a.score);
}
function inferIntent(q){
  const c=aiCleanText(q);
  if(/radicar|crear|registrar|solicitud|ticket|caso|requerimiento|necesito que|necesito ayuda|ayudame con|no puedo|falla|error|problema/.test(c))return "radicacion";
  if(/consultar|radicado|estado|seguimiento|codigo|ticket dt|dt-/.test(c))return "consulta";
  if(/mensaje|responsable|hablar|decirle|enviar|responder/.test(c))return "mensaje";
  if(/kpi|indicador|grafica|dashboard|productividad|tiempo|promedio|metric/.test(c))return "kpis";
  if(/auditoria|hallazgo|no conformidad|riesgo|control/.test(c))return "auditoria";
  if(/documento|formato|acta|matriz|procedimiento|manual|instructivo/.test(c))return "documental";
  if(/hola|buenas|gracias|quien eres|que puedes hacer|como estas|chao|adios/.test(c))return "conversacion";
  return "general";
}
function aiShouldDraft(q){
  const c=aiCleanText(q);
  return /(radicar|crear|registrar|solicitud|ticket|caso|requerimiento|necesito|solicito|requiero|ayudame|ayuda con|no puedo|falla|error|problema|bloquea|actualizar|revisar|corregir|aprobar|validar)/.test(c)&&aiTokens(c).length>=5;
}
function aiExtractEntities(text){
  const raw=String(text||"");
  const clean=aiCleanText(raw);
  const email=(raw.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i)||[])[0]||"";
  let requesterName="";
  const nameMatch=raw.match(/(?:soy|mi nombre es|me llamo)\s+([A-Za-zÁÉÍÓÚáéíóúÑñ ]{3,45})/i);
  if(nameMatch)requesterName=nameMatch[1].trim().replace(/\s+(y|de|del|para|por)\s.*$/i,"");
  let area="";
  const areaMatch=raw.match(/(?:área|area|proceso|desde|de parte de|soy de|pertenezco a)\s+([A-Za-zÁÉÍÓÚáéíóúÑñ0-9 /-]{3,55})/i);
  if(areaMatch)area=areaMatch[1].trim().replace(/\s+(porque|por que|ya que|necesito|solicito|para|con el fin).*$/i,"");
  const evidence=/pdf|foto|imagen|captura|pantallazo|drive|excel|word|acta|formato|factura|correo|evidencia|adjunto|anexo/.test(clean);
  const deadline=(raw.match(/(?:para|antes de|máximo|maximo|vence|vencimiento)\s+([A-Za-zÁÉÍÓÚáéíóúÑñ0-9 ,/-]{3,35})/i)||[])[1]||"";
  const impact=/auditoria|gerencia|cliente|bloquea|detenido|vencido|cumplimiento|legal|riesgo|operacion|operación|facturacion|facturación|cartera/.test(clean);
  return {email,requesterName,requesterArea:area,evidence,deadline:deadline.trim(),impact};
}
function classifyCategoryMax(clean){
  if(/auditoria|auditar|hallazgo|no conformidad|nc |accion correctiva|acción correctiva/.test(clean))return "Auditoría";
  if(/indicador|kpi|dashboard|grafica|gráfica|medir|metrica|métrica|power bi|reporte/.test(clean))return "Indicador/KPI";
  if(/capacitacion|capacitación|induccion|inducción|entrenamiento|curso|formacion/.test(clean))return "Capacitación";
  if(/riesgo|control|matriz de riesgo|peligro|impacto|plan de accion/.test(clean))return "Riesgo/Hallazgo";
  if(/documento|formato|pdf|word|excel|acta|matriz|registro|plantilla|archivo|version|versión|codificacion|codificación/.test(clean))return "Documento";
  if(/procedimiento|proceso|flujo|manual|instructivo|paso a paso|caracterizacion|caracterización/.test(clean))return "Procedimiento";
  if(/mejora|optimizar|automatizar|ajustar|redisenar|rediseñar|mejoramiento/.test(clean))return "Mejora continua";
  return "Consulta general";
}
function classifyPriorityMax(clean,entities){
  if(/critica|crítica|urgente|inmediato|bloquea|detenido|no deja|vencido|vence hoy|auditoria|gerencia|cliente|legal|cumplimiento|produccion parada|operacion parada/.test(clean))return "Crítica";
  if(/alta|importante|prioridad|pronto|esta semana|riesgo|impacto/.test(clean)||entities.impact)return "Alta";
  if(/baja|simple|consulta|cuando puedan|sin urgencia/.test(clean))return "Baja";
  return "Media";
}
function classifyModalityMax(clean){
  if(/visita|presencial|campo|reunion|reunión|acompanamiento|acompañamiento|capacitación presencial/.test(clean))return "Presencial";
  if(/documento|formato|pdf|word|excel|acta|matriz|procedimiento|manual|instructivo|registro|archivo/.test(clean))return "Documental";
  return "Mixta";
}
function makeTitleFromText(text,category){
  const raw=String(text||"").replace(/\s+/g," ").trim();
  let first=raw.split(/[\.\n]/)[0].replace(/^(hola|buenas|buenos dias|buenas tardes|por favor|necesito|requiero|solicito|ayudame a|ayúdame a)\s*/i,"").trim();
  first=first.slice(0,92);
  if(first.length<14)first=`Solicitud de ${String(category||"consulta").toLowerCase()}`;
  return first.charAt(0).toUpperCase()+first.slice(1);
}
function draftTicketFromText(text){
  const raw=String(text||"").trim();
  const clean=aiCleanText(raw);
  const entities=aiExtractEntities(raw);
  const category=classifyCategoryMax(clean);
  const priority=classifyPriorityMax(clean,entities);
  const modality=classifyModalityMax(clean);
  const assignedTo=suggestAssignee(category,priority);
  const title=makeTitleFromText(raw,category);
  const missing=[];
  if(!entities.requesterArea)missing.push("área o proceso de origen");
  if(!entities.evidence)missing.push("evidencia disponible, si aplica");
  if(!entities.deadline)missing.push("fecha o plazo esperado, si existe");
  const description=[
    `Necesidad identificada: ${raw}`,
    `Clasificación sugerida por IA: ${category}, prioridad ${priority}, modalidad ${modality}.`,
    entities.requesterArea?`Proceso o área de origen detectada: ${entities.requesterArea}.`:`Proceso o área de origen: pendiente por confirmar.`,
    entities.impact?`Impacto detectado: puede afectar operación, cumplimiento, auditoría o tiempos del proceso.`:`Impacto detectado: pendiente por precisar según alcance real.`,
    entities.evidence?`Evidencia: el solicitante menciona o puede adjuntar soporte documental, captura, archivo o enlace.`:`Evidencia: pendiente por adjuntar o describir.`,
    entities.deadline?`Plazo mencionado: ${entities.deadline}.`:`Plazo esperado: pendiente por confirmar.`,
    `Resultado esperado: recibir revisión, orientación, ajuste o soporte del equipo de Calidad y Mejoramiento Continuo, dejando trazabilidad de la respuesta.`,
    `Criterio de cierre: respuesta validada, evidencia revisada y registro de la gestión realizada.`
  ].join("\n\n");
  return {
    category,priority,modality,title,description,assignedTo,
    requesterName:entities.requesterName,
    requesterEmail:entities.email,
    requesterArea:entities.requesterArea,
    evidenceHint:entities.evidence?"Evidencia mencionada en la descripción. Adjuntar soporte si está disponible.":"",
    missing
  };
}
function aiDraftQuality(d){
  let score=0;
  if(d.title&&d.title.length>14)score+=20;
  if(d.category&&d.category!=="Consulta general")score+=20;
  if(d.requesterArea)score+=15;
  if(d.description&&d.description.length>180)score+=20;
  if(d.priority)score+=10;
  if(d.modality)score+=10;
  if(d.evidenceHint)score+=5;
  return Math.min(100,score);
}
function aiBuildDraftAnswer(d){
  const quality=aiDraftQuality(d);
  const missing=d.missing?.length?`\n\nPara dejarla más completa, faltaría confirmar: ${d.missing.join(", ")}.`:"";
  return `Listo. Organicé tu información como una radicación lista para revisar.

Asunto: ${d.title}

Descripción sugerida:
${d.description}${missing}

Puedes cargar este borrador en el formulario y solo completar lo que falte antes de enviarlo.`;
}
function aiConversationalReply(q){

function composeAI(q){
  const clean=aiCleanText(q);
  const intent=inferIntent(q);
  const talk=aiConversationalReply(q);
  if(talk){
    return {answer:`${talk}

Trabajo de forma operativa: si falta información, te pediré máximo tres datos; si puedo convertirlo en solicitud, te dejo el borrador listo.`,learn:false,actions:[aiAction("Crear solicitud","openCreate"),aiAction("Consultar radicado","focusLookup"),aiAction("Ver juegos IA","openGame")],confidence:.99};
  }

  const ticket=findTicketAI(q);
  if(ticket){
    return {answer:`Encontré una solicitud relacionada: ${ticket.code} · ${ticket.title}.

Estado actual: ${ticket.status}.
Responsable: ${userName(ticket.assignedTo)}.
Última actualización: ${fmt(ticket.updated_at)}.

Puedes abrirla o enviar un mensaje directo al responsable.`,learn:false,actions:[aiAction("Abrir solicitud","openTicket",{id:ticket.id}),aiAction("Enviar mensaje al responsable","messageTicket",{id:ticket.id}),aiAction("Crear otra solicitud","openCreate")],confidence:.98};
  }

  if(aiShouldDraft(q)){
    const d=draftTicketFromText(q);
    return {answer:aiBuildDraftAnswer(d),learn:false,draft:d,actions:[aiAction("Cargar borrador en formulario","useDraft"),aiAction("Crear solicitud manual","openCreate"),aiAction("Seguir conversando","focusAI")],confidence:.86};
  }

  const ranked=aiRankKnowledge(q);
  const top=ranked[0];
  const second=ranked[1];
  if(top&&top.score>=.24){
    const context=top.source==="tickets"?"Tomé como referencia el historial de solicitudes.":top.source==="memoria"?"Tomé como referencia una memoria entrenada.":top.source==="corpus"?"Tomé como referencia el corpus conversacional.":"Tomé como referencia la base de conocimiento.";
    return {answer:`${top.answer}

${context}
Confianza de interpretación: ${aiConfidenceLabel(top.score)}.

Puedo convertir esto en solicitud, explicarlo paso a paso o llevarte al módulo correspondiente.`,learn:false,actions:guidedOptionsForIntent(intent),confidence:top.score,related:[top,second]};
  }

  if(top&&top.score>=.14){
    return {answer:`Creo que tu pregunta puede relacionarse con “${top.title || top.intent}”, pero no tengo suficiente seguridad para responder como si fuera exacto.

Para ayudarte bien, reformula la pregunta con estos tres datos:
1. Área o proceso relacionado.
2. Qué necesitas o qué problema ocurre.
3. Resultado esperado o evidencia disponible.

Ejemplo: “Soy de cartera, no puedo adjuntar el PDF de la factura y necesito que calidad revise el bloqueo para radicar evidencia”.`,learn:false,actions:[aiAction("Convertir en solicitud","useDraft"),aiAction("Crear solicitud manual","openCreate"),aiAction("Consultar radicado","focusLookup")],draft:draftTicketFromText(q),confidence:top.score};
  }

  return {answer:`No te entendí con suficiente precisión para darte una respuesta confiable.

Por favor registra mejor tu pregunta con esta estructura:
1. Proceso o área.
2. Problema o necesidad.
3. Evidencia disponible.
4. Resultado esperado.

Con eso puedo conversar contigo, organizar la radicación, sugerir prioridad, responsable y descripción completa.`,learn:false,actions:[aiAction("Crear solicitud","openCreate"),aiAction("Consultar radicado","focusLookup"),aiAction("Hablar con IA","focusAI")],confidence:0};
}

    .replace(/Tomé como referencia[^.]*\./gi,"")
    .replace(/Confianza de interpretación:\s*[^\n.]+\.?/gi,"")
    .replace(/base de conocimiento/gi,"información disponible")

function aiHostileReply(q){
  const c=aiCleanText(q);
  if(/(basura|porqueria|porquería|mierda|horrible|no sirves|no sirve|malisimo|malísimo|pesimo|pésimo|que asco|no entiendes|bruto|inutil|inútil)/.test(c)){

  }
  return "";
}

function aiTryMath(q){
  const raw=String(q||"");
  const c=aiCleanText(raw);

  let sqrtMatch=raw.match(/(?:ra[ií]z cuadrada de|sqrt\s*\(?|√)\s*([0-9]+(?:[.,][0-9]+)?)/i);
  if(sqrtMatch){
    const n=Number(String(sqrtMatch[1]).replace(",","."));
    if(Number.isFinite(n)&&n>=0)return `La raíz cuadrada de ${n} es ${Number(Math.sqrt(n).toFixed(8))}.`;
  }

  if(/derivada|derivar|d\/dx/.test(c)){
    let expr=raw.replace(/.*?(?:derivada de|derivar|d\/dx)\s*/i,"").trim();
    expr=expr.replace(/\s+/g,"");
    if(!expr)return "Puedo ayudarte con derivadas simples. Escríbela así: “derivada de x^3 + 2x^2 - 5x + 8”.";
    const result=derivePolynomial(expr);
    if(result)return `La derivada de ${expr} es ${result}.`;
    return "Puedo resolver derivadas simples de polinomios, por ejemplo: x^3 + 2x^2 - 5x + 8. Para una derivada más avanzada, escríbela más clara y la revisamos.";
  }

  if(/cuanto es|cuánto es|calcula|sum(a|ar)|rest(a|ar)|multiplic|divid|porcentaje|[\d]\s*[\+\-\*\/x×]\s*[\d]/.test(c)){
    let expr=raw.toLowerCase()
      .replace(/cu[aá]nto es|calcula|resultado de|por favor|cuanto da/gi,"")
      .replace(/más|mas/gi,"+")
      .replace(/menos/gi,"-")
      .replace(/por ciento/gi,"%")
      .replace(/por/gi,"*")
      .replace(/x|×/gi,"*")
      .replace(/entre|dividido por/gi,"/")
      .replace(/,/g,".")
      .trim();
    if(/%/.test(expr)){
      const m=expr.match(/([0-9.]+)\s*%\s*(?:de)?\s*([0-9.]+)/);
      if(m){
        const a=Number(m[1]),b=Number(m[2]);
        if(Number.isFinite(a)&&Number.isFinite(b))return `${a}% de ${b} es ${Number((a*b/100).toFixed(8))}.`;
      }
    }
    if(/^[0-9+\-*/().\s^]+$/.test(expr)){
      expr=expr.replace(/\^/g,"**");
      try{
        const val=Function('"use strict";return ('+expr+')')();
        if(Number.isFinite(val))return `${raw.replace(/\s+/g," ").trim()} = ${Number(val.toFixed(8))} ✅`;
      }catch(e){}
    }
  }
  return "";
}

function derivePolynomial(expr){
  let e=String(expr||"").replace(/\s+/g,"").replace(/−/g,"-");
  e=e.replace(/-/g,"+-");
  if(e.startsWith("+"))e=e.slice(1);
  const terms=e.split("+").filter(Boolean);
  const out=[];
  for(let t of terms){
    let sign=1;
    if(t.startsWith("-")){sign=-1;t=t.slice(1);}
    if(!t.includes("x"))continue;
    let coef=1,pow=1;
    const before=t.split("x")[0];
    if(before&&before!=="*")coef=Number(before.replace("*",""));
    if(!Number.isFinite(coef))coef=1;
    coef*=sign;
    const pm=t.match(/x\^(-?\d+)/);
    if(pm)pow=Number(pm[1]);
    const newCoef=coef*pow;
    const newPow=pow-1;
    if(newCoef===0)continue;
    let part="";
    if(newPow===0)part=String(newCoef);
    else{
      if(newCoef===1)part="x";
      else if(newCoef===-1)part="-x";
      else part=String(newCoef)+"x";
      if(newPow!==1)part+="^"+newPow;
    }
    out.push(part);
  }
  if(!out.length)return "0";
  return out.join(" + ").replace(/\+ -/g,"- ");
}

  if(w.step==="area")w.data.area=value;

function composeAI(q){
  const clean=aiCleanText(q);

  const hostile=aiHostileReply(q);
  if(hostile)return {answer:hostile,actions:[aiAction("Radicar solicitud","openCreate"),aiAction("Seguir conversando","focusAI")]};

  const math=aiTryMath(q);
  if(math)return {answer:math,actions:[aiAction("Radicar solicitud","openCreate"),aiAction("Seguir conversando","focusAI")]};

  const nav=aiNavigationGuide(q);
  if(nav)return {answer:nav,actions:[aiAction("Ir al módulo","openCreate"),aiAction("IA Calidad","focusAI")]};

  const decision=aiOpinionDecision(q);
  if(decision)return {answer:decision,actions:[aiAction("Armar solicitud","useDraft"),aiAction("Nueva solicitud","openCreate")],draft:draftTicketFromText(q)};

  const ticket=findTicketAI(q);
  if(ticket){
    return {answer:`Encontré la solicitud ${ticket.code}.

Estado: ${ticket.status}.
Responsable: ${userName(ticket.assignedTo)}.
Última actualización: ${fmt(ticket.updated_at)}.

Puedes abrirla o escribir un mensaje al responsable.`,actions:[aiAction("Abrir solicitud","openTicket",{id:ticket.id}),aiAction("Enviar mensaje","messageTicket",{id:ticket.id})]};
  }

  if(/(radicar|mradicar|crear|registrar|solicitud|solisitud|ticket|caso|requerimiento|no se quien|no sé quien|quien lo resuelve|quién lo resuelve|quien debe resolver|documento pero)/.test(clean)){
    return aiStartDraftWizard(q);
  }

  const talk=aiConversationalReply(q);
  if(talk)return {answer:talk,actions:[aiAction("Radicar solicitud","openCreate"),aiAction("Consultar radicado","focusLookup"),aiAction("Juegos IA","openGame")]};

  const ranked=aiRankKnowledge(q);
  const top=ranked[0];
  if(top&&top.score>=.24){
    return {answer:aiSober(`${top.answer}

¿Quieres que lo convirtamos en una solicitud?`),actions:[aiAction("Armar solicitud","useDraft"),aiAction("Nueva solicitud","openCreate"),aiAction("Consultar radicado","focusLookup")],draft:draftTicketFromText(q)};
  }

  if(top&&top.score>=.14){
    return {answer:"Tengo una idea de por dónde va, pero necesito precisarlo para no darte una respuesta floja. Dime solo esto: ¿es documento, procedimiento, auditoría, KPI, riesgo, capacitación o mejora?",actions:[aiAction("Nueva solicitud","openCreate"),aiAction("Seguir conversando","focusAI")]};
  }

  return {answer:"No lo tengo claro todavía. Para ayudarte bien, dime: área o proceso, qué ocurrió y qué resultado necesitas. Con eso te respondo o te armo la radicación. 📌",actions:[aiAction("Nueva solicitud","openCreate"),aiAction("Consultar radicado","focusLookup")]};
}

   Mantiene base funcional y suma capacidades sin cambiar SQL.

const VALOR_TOTAL_VERSION="Valor Total · SLA + calidad + auditoría + PDF";

const SLA_RULES={
  "Baja":{hours:120,label:"5 días hábiles"},
  "Media":{hours:72,label:"3 días hábiles"},
  "Alta":{hours:48,label:"48 horas"},
  "Crítica":{hours:8,label:"8 horas prioritarias"}
};

function valueCleanText(text){return String(text||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();}
function slaRule(priority){return SLA_RULES[priority]||SLA_RULES["Media"];}
function slaInfo(t){
  const rule=slaRule(t.priority);
  const start=new Date(t.created_at||now()).getTime();
  const due=new Date(start+rule.hours*3600000);
  const end=["Resuelta","Cerrada"].includes(t.status)?new Date(t.finishedAt||t.updated_at||now()):new Date();
  const elapsed=Math.max(0,(end.getTime()-start)/3600000);
  const remaining=rule.hours-elapsed;
  const pct=Math.min(100,Math.round((elapsed/rule.hours)*100));
  let label="En tiempo";
  if(["Resuelta","Cerrada"].includes(t.status))label=elapsed<=rule.hours?"Cumplido":"Cerrado vencido";
  else if(remaining<0)label="Vencido";
  else if(remaining<=Math.max(4,rule.hours*.2))label="Por vencer";
  return {rule,due,elapsed,remaining,pct,label};
}
function slaTag(t){
  const s=slaInfo(t);
  const cls=s.label.includes("Vencido")||s.label.includes("vencido")?"gold":"blue";
  return `<span class="tag ${cls}">SLA: ${escapeHtml(s.label)}</span>`;
}
function ticketQualityFromObject(t){
  const misses=[];
  let score=0;
  if(t.requesterName){score+=10}else misses.push("nombre del solicitante");
  if(t.requesterArea){score+=12}else misses.push("área o proceso");
  if(t.assignedTo){score+=10}else misses.push("responsable");
  if(t.category&&t.category!=="Consulta general"){score+=12}else misses.push("categoría precisa");
  if(t.priority){score+=8}else misses.push("prioridad");
  if(t.modality){score+=8}else misses.push("modalidad");
  if(t.title&&String(t.title).trim().length>=12){score+=12}else misses.push("asunto claro");
  if(t.description&&String(t.description).trim().length>=80){score+=16}else misses.push("descripción con contexto");
  if((t.evidence&&String(t.evidence).trim())||(t.attachments&&t.attachments.length)){score+=7}else misses.push("evidencia o adjunto");
  const desc=valueCleanText(t.description);
  if(/resultado|esperado|cierre|validacion|validación|plazo|fecha|impacto/.test(desc)){score+=5}else misses.push("resultado esperado, impacto o criterio de cierre");
  score=Math.min(100,score);
  const label=score>=80?"Excelente":score>=60?"Aceptable":"Débil";
  return {score,label,misses};
}

function collectTemplateData(fd){

function appendTemplateToDescription(desc,templateData){

function classifyFromText(text){
  const c=valueCleanText(text);
  if(/auditoria|auditoria|hallazgo|no conformidad|evidencia auditoria|accion correctiva/.test(c))return {category:"Auditoría",priority:"Alta",modality:"Documental"};
  if(/indicador|kpi|grafica|dashboard|meta|medicion|reporte/.test(c))return {category:"Indicador/KPI",priority:"Media",modality:"Mixta"};
  if(/capacitacion|induccion|curso|certificado|entrenamiento/.test(c))return {category:"Capacitación",priority:"Media",modality:"Mixta"};
  if(/riesgo|control|impacto|probabilidad/.test(c))return {category:"Riesgo/Hallazgo",priority:"Alta",modality:"Documental"};
  if(/procedimiento|manual|instructivo|proceso|paso a paso|flujo/.test(c))return {category:"Procedimiento",priority:"Media",modality:"Documental"};
  if(/documento|formato|acta|matriz|registro|pdf|word|excel|version|codificacion|archivo/.test(c))return {category:"Documento",priority:"Media",modality:"Documental"};
  if(/mejora|automatizar|optimizar|reproceso|app|sistema/.test(c))return {category:"Mejora continua",priority:"Alta",modality:"Mixta"};
  return {category:"Consulta general",priority:"Media",modality:"Mixta"};
}
