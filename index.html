function uid(prefix="id"){return prefix+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8)}
function slug(text){return String(text).normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")}
function now(){return new Date().toISOString()}
function fmt(date){if(!date)return"—";return new Intl.DateTimeFormat("es-CO",{dateStyle:"medium",timeStyle:"short"}).format(new Date(date))}
function hoursBetween(a,b){if(!a||!b)return 0;return Math.max(0,(new Date(b)-new Date(a))/36e5)}
function initials(name){return String(name||"DT").split(" ").filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase()}
async function hashPin(pin){const enc=new TextEncoder().encode(String(pin));const buf=await crypto.subtle.digest("SHA-256",enc);return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("")}
function escapeHtml(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]))}
function normalize(row){return row&&row.payload?{...row.payload,id:row.id,created_at:row.created_at,updated_at:row.updated_at}:row}
function payloadOf(item){const p={...item};delete p.created_at;delete p.updated_at;return p}
function storageKey(table){return "dtc_"+table}
function localList(table){return JSON.parse(localStorage.getItem(storageKey(table))||"[]")}
function localSave(table,rows){localStorage.setItem(storageKey(table),JSON.stringify(rows))}
async function listRecords(table){if(sb){try{const {data,error}=await sb.from(table).select("*").order("updated_at",{ascending:false});if(!error&&data)return data.map(normalize)}catch(e){}}return localList(table)}
async function saveRecord(table,item){item.updated_at=now();item.created_at=item.created_at||now();if(sb){try{const row={id:item.id,payload:payloadOf(item),created_at:item.created_at,updated_at:item.updated_at};const {data,error}=await sb.from(table).upsert(row).select().single();if(!error&&data)return normalize(data)}catch(e){}}const rows=localList(table);const ix=rows.findIndex(x=>x.id===item.id);if(ix>=0)rows[ix]=item;else rows.unshift(item);localSave(table,rows);return item}
async function removeRecord(table,id){if(sb){try{await sb.from(table).delete().eq("id",id)}catch(e){}}localSave(table,localList(table).filter(x=>x.id!==id))}
async function seed(){let users=await listRecords(tables.users);if(!users.length){for(const u of defaultUsers){await saveRecord(tables.users,{id:u.id||slug(u.name),...u,created_at:now(),updated_at:now(),active:true})}users=await listRecords(tables.users)}state.users=users;state.tickets=await listRecords(tables.tickets);state.aiMemories=await listRecords(tables.ai);if(state.aiMemories.length<10){for(const k of aiKnowledge){await saveRecord(tables.ai,{id:"base_"+k.id,key:k.keywords.join(","),answer:k.answer,intent:k.intent,route:k.route,createdBy:"Modelo base",created_at:now(),updated_at:now(),active:true})}state.aiMemories=await listRecords(tables.ai)}state.scores=await listRecords(tables.scores)}
function hasLead(){return state.user&&["Jefe de auditoría interna","Jefe general","Administrador"].includes(state.user.role)}
function isInternal(){return state.user&&state.user.role!=="Solicitante"}
function canManageUsers(){return !!(state.user&&(state.user.isSuperAdmin===true||state.user.roleKey==="super_admin"||state.user.role==="Super Admin / Desarrollador"))}
function responders(){return state.users.filter(u=>u.active!==false&&u.role!=="Solicitante")}
function modeLabel(){return sb?"Supabase conectado":"Modo local activo"}
function modeOn(){return !!sb}
function toast(text){const el=document.getElementById("toast");el.textContent=text;gsap.to(el,{opacity:1,y:0,duration:.25});setTimeout(()=>gsap.to(el,{opacity:0,y:12,duration:.25}),2600)}
function popup(title,text,gif){Swal.fire({html:`<div class="popup-layout"><img class="popup-gif" src="${gif}"><div><h3>${escapeHtml(title)}</h3><p>${escapeHtml(text)}</p></div></div>`,showConfirmButton:true,confirmButtonText:"Entendido",confirmButtonColor:"#0d5bd2",background:"#ffffff"})}
function randomSentGif(){return assets.sent[Math.floor(Math.random()*assets.sent.length)]}
function setupLogin(){const app=document.getElementById("app");app.innerHTML=`<div class="login-page"><div class="login-card"><section class="login-hero"><img class="logo-login" src="${assets.logo}" alt="Dream Team de Calidad"><div class="dance-box"><img src="${assets.loginDance}" alt="Animación"><div><h1>Mesa de ayuda con flow.</h1><p>Radica, mide, conversa, aprende y cierra solicitudes con trazabilidad real.</p></div></div></section><section class="login-form"><h2>Ingresar</h2><p>Selecciona tu usuario interno. Los solicitantes no necesitan cuenta: radican o consultan por código.</p><div class="field"><label>Perfil</label><select id="loginUser"><option value="guest">Radicar o consultar sin usuario</option>${responders().map(u=>`<option value="${u.id}">${escapeHtml(u.name)} · ${escapeHtml(u.role)}</option>`).join("")}</select></div><div class="field" id="pinBox"><label>PIN</label><input id="loginPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="PIN del usuario interno"></div><button class="btn primary" id="loginBtn">Entrar a la mesa</button><button class="btn ghost" id="guestBtn">Radicar / consultar</button><button class="btn gold" type="button" onclick="loginGuest().then(()=>setView('ai'))">Probar IA</button><div class="mode-pill"><span class="dot ${modeOn()?"on":""}"></span>${modeLabel()}</div></section></div></div>`;document.getElementById("loginUser").addEventListener("change",e=>{document.getElementById("pinBox").style.display=e.target.value==="guest"?"none":"grid"});document.getElementById("pinBox").style.display="none";document.getElementById("guestBtn").onclick=()=>loginGuest();document.getElementById("loginBtn").onclick=login;gsap.from(".login-card",{opacity:0,y:30,duration:.55,ease:"power2.out"})}
async function loginGuest(){state.user={id:"guest_"+Date.now(),name:"Solicitante general",role:"Solicitante",area:"Usuario general",statusText:"Radicando solicitudes",avatar:assets.loginDance};state.view="create";renderApp();popup("Bienvenido","Puedes radicar una solicitud o consultar el estado por código. La cuenta solo aplica para analistas y jefes.",assets.loginDance)}
async function login(){const id=document.getElementById("loginUser").value;if(id==="guest")return loginGuest();const u=state.users.find(x=>x.id===id);const pin=document.getElementById("loginPin").value.trim();if(!u)return popup("No encontré ese usuario","Revisa el perfil seleccionado o vuelve a cargar la aplicación.",assets.missing);const hp=await hashPin(pin);if(hp!==u.pinHash)return popup("PIN incorrecto","Ese PIN no coincide con el usuario seleccionado. Verifica la contraseña asignada a tu usuario.",assets.missing);state.user=u;state.view="dashboard";renderApp();toast("Sesión iniciada")}
function renderApp(){const app=document.getElementById("app");app.innerHTML=`<div class="app-shell"><aside class="sidebar" id="sidebar"><div class="brand"><img src="${assets.logo}" alt="Dream Team de Calidad"></div><div class="user-card"><img class="avatar" src="${state.user.avatar||assets.loginDance}" onerror="this.src='${assets.loginDance}'"><div><div class="user-name">${escapeHtml(state.user.name)}</div><div class="user-role">${escapeHtml(state.user.role)}</div><div class="user-status">${escapeHtml(state.user.statusText||"Disponible")}</div></div></div><nav class="nav">${navHtml()}</nav><div class="side-footer"><div class="mode-pill"><span class="dot ${modeOn()?"on":""}"></span>${modeLabel()}</div><button class="btn ghost small" onclick="logout()">Salir</button></div></aside><main class="main"><header class="topbar"><button class="mobile-menu" onclick="toggleMenu()">☰</button><div class="page-title"><h1>${pageTitle()}</h1><p>${pageSub()}</p></div><div class="top-actions"><button class="btn primary" onclick="setView('create')">Nueva solicitud</button><button class="btn ghost" onclick="refreshData()">Actualizar</button></div></header><div id="view"></div></main><button class="float-ai" onclick="setView('ai')">🤖 IA Calidad</button></div>`;renderView();setTimeout(()=>gsap.from("#view .card, #view .metric, #view .lane",{opacity:0,y:20,duration:.38,stagger:.035,ease:"power2.out"}),0)}
function navButton(view,icon,label){return `<button class="${state.view===view?"active":""}" onclick="setView('${view}')"><span class="icon">${icon}</span>${label}</button>`}
function navHtml(){if(!isInternal())return `${navButton("create","➕","Radicar / consultar")}${navButton("ai","🤖","IA Calidad")}`;return `${navButton("dashboard","📊","Panel")}${navButton("tickets","🎫","Solicitudes")}${navButton("create","➕","Nueva solicitud")}${navButton("kpis","📈","KPIs")}${navButton("team","👥","Equipo")}${navButton("ai","🤖","IA Calidad")}${navButton("game","🎮","Reto")}`}
function pageTitle(){return {dashboard:"Centro de control",tickets:"Solicitudes trazables",create:"Nueva solicitud",kpis:"KPIs y productividad",team:"Equipo Dream Team",ai:"IA de Calidad",game:"Reto de criterio"}[state.view]||"Mesa de ayuda"}
function pageSub(){return {dashboard:"Vista rápida de carga, tiempos y estados.",tickets:"Seguimiento de origen, responsable, prioridad y conversación.",create:"Radica con contexto claro para evitar reprocesos.",kpis:"Mide demanda, tiempos, categorías y responsables.",team:"Usuarios, estados y perfiles del área.",ai:"Chatbot entrenable con tickets, documentos y buenas prácticas.",game:"Aprende jugando y alimenta la memoria del sistema."}[state.view]||""}
function setView(v){if(!isInternal()&&!['create','ai'].includes(v))v="create";state.view=v;state.selectedTicket=null;renderApp()}
function toggleMenu(){document.getElementById("sidebar").classList.toggle("open")}
function logout(){state.user=null;setupLogin()}
async function refreshData(){state.users=await listRecords(tables.users);state.tickets=await listRecords(tables.tickets);state.aiMemories=await listRecords(tables.ai);state.scores=await listRecords(tables.scores);renderApp();toast("Información actualizada")}
function renderView(){const el=document.getElementById("view");if(state.view==="dashboard")el.innerHTML=dashboardHtml();if(state.view==="tickets")el.innerHTML=ticketsHtml();if(state.view==="create")el.innerHTML=createHtml();if(state.view==="kpis")el.innerHTML=kpisHtml();if(state.view==="team")el.innerHTML=teamHtml();if(state.view==="ai")el.innerHTML=aiHtml();if(state.view==="game")el.innerHTML=gameHtml();bindView()}
function metrics(){const total=state.tickets.length;const open=state.tickets.filter(t=>!["Resuelta","Cerrada"].includes(t.status)).length;const closed=state.tickets.filter(t=>["Resuelta","Cerrada"].includes(t.status));const avg=closed.length?closed.reduce((a,t)=>a+hoursBetween(t.created_at,t.finishedAt||t.updated_at),0)/closed.length:0;const extended=state.tickets.filter(t=>t.status==="Espera ampliada").length;return{total,open,closed:closed.length,avg,extended,rate:total?Math.round(closed.length*100/total):0}}
function dashboardHtml(){const m=metrics();return `<div class="grid cols-4"><div class="metric card"><div class="label">Solicitudes</div><div class="value">${m.total}</div><div class="hint">Radicadas en el sistema</div></div><div class="metric card"><div class="label">Abiertas</div><div class="value">${m.open}</div><div class="hint">Pendientes de gestión</div></div><div class="metric card"><div class="label">Cierre</div><div class="value">${m.rate}%</div><div class="hint">Resueltas o cerradas</div></div><div class="metric card"><div class="label">Tiempo prom.</div><div class="value">${m.avg.toFixed(1)}h</div><div class="hint">Desde radicación hasta cierre</div></div></div><div class="grid cols-2" style="margin-top:18px"><div class="card"><div class="section-title"><h2>Mapa de estados</h2><span>arrastre visual operativo</span></div><div class="kanban">${statusFlow.slice(0,5).map(s=>laneHtml(s)).join("")}</div></div><div class="card"><div class="section-title"><h2>KPIs rápidos</h2><span>categoría y responsable</span></div><div class="grid cols-2"><canvas id="chartStatus"></canvas><canvas id="chartAssignee"></canvas></div></div></div><div class="card" style="margin-top:18px"><div class="section-title"><h2>Últimas solicitudes</h2><span>${state.tickets.slice(0,8).length} registros recientes</span></div>${ticketTable(state.tickets.slice(0,8))}</div>`}
function laneHtml(status){const list=state.tickets.filter(t=>t.status===status).slice(0,8);return `<div class="lane"><h3>${escapeHtml(status)} · ${list.length}</h3>${list.map(t=>`<div class="mini-ticket" onclick="openTicket('${t.id}')"><strong>${escapeHtml(t.code||t.id)}</strong><p>${escapeHtml(t.title)}</p><p>${escapeHtml(userName(t.assignedTo)||"Sin asignar")}</p></div>`).join("")||`<div class="empty">Sin registros</div>`}</div>`}
function ticketsHtml(){return `<div class="card"><div class="filters"><input id="fQ" placeholder="Buscar por código, solicitante, responsable o tema" value="${escapeHtml(state.filters.q)}"><select id="fStatus"><option>Todos</option>${statusFlow.map(x=>`<option ${state.filters.status===x?"selected":""}>${x}</option>`).join("")}</select><select id="fAssignee"><option>Todos</option>${state.users.map(u=>`<option value="${u.id}" ${state.filters.assignee===u.id?"selected":""}>${escapeHtml(u.name)}</option>`).join("")}</select><select id="fPriority"><option>Todos</option>${priorities.map(x=>`<option ${state.filters.priority===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="section-title"><h2>Listado de solicitudes</h2><span>${filteredTickets().length} coincidencias</span></div>${ticketTable(filteredTickets())}</div>`}
function filteredTickets(){const q=state.filters.q.toLowerCase().trim();return state.tickets.filter(t=>{const text=[t.code,t.title,t.description,t.requesterName,t.requesterArea,userName(t.assignedTo),t.category].join(" ").toLowerCase();return(!q||text.includes(q))&&(state.filters.status==="Todos"||t.status===state.filters.status)&&(state.filters.assignee==="Todos"||t.assignedTo===state.filters.assignee)&&(state.filters.priority==="Todos"||t.priority===state.filters.priority)})}
function ticketTable(list){if(!list.length)return `<div class="empty">No hay solicitudes para mostrar.</div>`;return `<div class="table-wrap"><table><thead><tr><th>Código</th><th>Solicitud</th><th>Origen</th><th>Responsable</th><th>Estado</th><th>Prioridad</th><th>Actualización</th><th></th></tr></thead><tbody>${list.map(t=>`<tr><td><strong>${escapeHtml(t.code)}</strong></td><td>${escapeHtml(t.title)}<br><span style="color:#7b8797">${escapeHtml(t.category)} · ${escapeHtml(t.modality)}</span></td><td>${escapeHtml(t.requesterArea||"—")}<br><span style="color:#7b8797">${escapeHtml(t.requesterName||"—")}</span></td><td>${escapeHtml(userName(t.assignedTo)||"Sin asignar")}</td><td>${statusTag(t.status)}</td><td>${priorityTag(t.priority)}</td><td>${fmt(t.updated_at||t.created_at)}</td><td><button class="btn ghost small" onclick="openTicket('${t.id}')">Ver</button></td></tr>`).join("")}</tbody></table></div>`}
function statusTag(s){const c={"Enviada":"blue","Sin aceptar":"gray","En proceso":"gold","Espera ampliada":"purple","Resuelta":"green","Cerrada":"green"}[s]||"gray";return `<span class="tag ${c}">${escapeHtml(s)}</span>`}
function priorityTag(p){const c={"Baja":"gray","Media":"blue","Alta":"gold","Crítica":"red"}[p]||"gray";return `<span class="tag ${c}">${escapeHtml(p||"Media")}</span>`}
function userName(id){return state.users.find(u=>u.id===id)?.name}
function createHtml(){return `<div class="grid cols-2"><div class="card"><div class="section-title"><h2>Radicar solicitud</h2><span>origen + responsable + trazabilidad</span></div><form class="form" id="ticketForm"><div class="grid cols-2"><div class="field"><label>Nombre del solicitante</label><input name="requesterName" required value="${state.user.role==="Solicitante"?"":escapeHtml(state.user.name)}"></div><div class="field"><label>Correo</label><input name="requesterEmail" type="email" placeholder="correo@empresa.com"></div></div><div class="grid cols-2"><div class="field"><label>Área / proceso de origen</label><input name="requesterArea" required placeholder="Ej. Logística, cartera, ventas, producción"></div><div class="field"><label>Responsable</label><select name="assignedTo" required>${responders().map(u=>`<option value="${u.id}">${escapeHtml(u.name)} · ${escapeHtml(u.role)}</option>`).join("")}</select></div></div><div class="grid cols-3"><div class="field"><label>Categoría</label><select name="category">${categories.map(c=>`<option>${c}</option>`).join("")}</select></div><div class="field"><label>Prioridad</label><select name="priority">${priorities.map(p=>`<option ${p==="Media"?"selected":""}>${p}</option>`).join("")}</select></div><div class="field"><label>Modalidad</label><select name="modality"><option>Documental</option><option>Presencial</option><option>Mixta</option></select></div></div><div class="field"><label>Asunto</label><input name="title" required placeholder="Describe el tema en una línea"></div><div class="field"><label>Descripción completa</label><textarea name="description" required placeholder="Qué necesitas, por qué se solicita, evidencia disponible y resultado esperado"></textarea></div><div class="field"><label>Enlace o evidencia opcional</label><input name="evidence" placeholder="Drive, PDF, imagen, acta, formato, captura"></div><button class="btn primary" type="submit">Enviar solicitud</button></form></div><div style="display:grid;gap:18px"><div class="card"><div class="section-title"><h2>Asistente IA para radicar</h2><span>${AI_ENGINE_VERSION}</span></div><div class="form"><div class="field"><label>Describe la necesidad en lenguaje normal</label><textarea id="draftIdea" placeholder="Ej. Necesito que calidad me ayude a actualizar el procedimiento de entrega porque auditoría pidió evidencia y no sé cómo radicarlo"></textarea></div><button class="btn gold" type="button" onclick="generateTicketDraft()">Crear borrador con IA</button><div class="empty">La IA analiza intención, prioridad, modalidad y posible responsable. Luego completa el formulario para que solo revises y envíes.</div></div></div><div class="card"><div class="section-title"><h2>Consulta rápida</h2><span>para usuario general</span></div><div class="form"><div class="field"><label>Código de solicitud</label><input id="lookupCode" placeholder="DT-0001"></div><button class="btn ghost" onclick="lookupTicket()">Buscar solicitud</button><div class="empty">Cuando la solicitud exista, se abrirá su trazabilidad completa con mensajes, estado y responsable.</div></div></div></div></div>`}
function kpisHtml(){return `<div class="grid cols-4">${Object.entries(metrics()).slice(0,4).map(([k,v])=>`<div class="metric card"><div class="label">${k}</div><div class="value">${typeof v==="number"?Number(v).toFixed(k==="avg"?1:0):v}</div><div class="hint">Indicador operativo</div></div>`).join("")}</div><div class="grid cols-2" style="margin-top:18px"><div class="card"><div class="section-title"><h2>Por categoría</h2><span>demanda del área</span></div><canvas id="chartCategory"></canvas></div><div class="card"><div class="section-title"><h2>Por responsable</h2><span>carga operativa</span></div><canvas id="chartResponsible"></canvas></div><div class="card"><div class="section-title"><h2>Por estado</h2><span>flujo actual</span></div><canvas id="chartKStatus"></canvas></div><div class="card"><div class="section-title"><h2>Tiempo promedio por responsable</h2><span>horas de resolución</span></div><canvas id="chartTime"></canvas></div></div>`}
function teamHtml(){const creator=canManageUsers()?`<div class="card"><div class="section-title"><h2>Crear usuario</h2><span>solo Super Admin</span></div><form class="form" id="userForm"><div class="field"><label>Nombre</label><input name="name" required></div><div class="field"><label>Rol</label><select name="role">${roles.map(r=>`<option>${r}</option>`).join("")}</select></div><div class="field"><label>Área</label><input name="area" value="Calidad y mejora continua"></div><div class="field"><label>PIN</label><input name="pin" type="password" inputmode="numeric" required></div><div class="field"><label>Foto, GIF o avatar</label><input name="avatar" placeholder="URL o ruta del GIF"></div><div class="field"><label>Estado</label><input name="statusText" placeholder="Ej. En auditoría, vuelvo en la tarde"></div><button class="btn primary" type="submit">Guardar usuario</button></form></div>`:`<div class="card"><div class="section-title"><h2>Creación de usuarios</h2><span>acceso restringido</span></div><div class="empty">Solo el Super Admin puede crear usuarios internos y asignar roles. Los solicitantes no requieren usuario: consultan por radicado.</div></div>`;return `<div class="grid cols-2"><div class="card"><div class="section-title"><h2>Perfiles internos</h2><span>${responders().length} usuarios</span></div><div class="profile-grid">${responders().map(u=>`<div class="profile-card"><img src="${u.avatar||assets.loginDance}" onerror="this.src='${assets.loginDance}'"><div><strong>${escapeHtml(u.name)}</strong><div class="user-role">${escapeHtml(u.role)}</div><div class="user-status">${escapeHtml(u.statusText||"Disponible")}</div></div></div>`).join("")}</div></div>${creator}</div>`}
function aiHtml(){return `<div class="ai-layout"><div class="card"><div class="section-title"><h2>Chatbot de Calidad</h2><span>${AI_ENGINE_VERSION} · ${state.aiMemories.length} memorias</span></div><div class="ai-chat" id="aiChat">${state.aiHistory.map(m=>`<div class="${m.me?"human":"bot"}">${escapeHtml(m.text)}</div>`).join("")||`<div class="bot">Hola, soy la IA del Dream Team de Calidad. Puedo ayudarte a crear solicitudes, consultar radicados, redactar respuestas, clasificar prioridades, explicar KPIs, ordenar procedimientos y aprender de documentos.</div>`}</div><div class="form" style="margin-top:12px"><div class="field"><label>Mensaje</label><input id="aiPrompt" placeholder="Ej. ayúdame a crear una solicitud para actualizar un procedimiento"></div><button class="btn primary" onclick="askAI()">Conversar</button></div></div><div class="card"><div class="section-title"><h2>Entrenar IA</h2><span>memoria + documentos + tickets</span></div><div class="form"><div class="field"><label>Subir documento</label><input id="knowledgeFile" type="file" accept=".pdf,.txt,.csv,.md,.json"></div><button class="btn ghost" onclick="learnFromFile()">Leer y aprender</button><div class="field"><label>Pregunta o palabra clave</label><input id="learnKey" placeholder="Ej. remanente, auditoría, procedimiento"></div><div class="field"><label>Respuesta esperada</label><textarea id="learnAnswer" placeholder="Escribe cómo debe responder el bot"></textarea></div><button class="btn gold" onclick="manualLearn()">Guardar memoria</button><div class="empty">Modelo matemático: intención + palabras clave + similitud de tokens + memorias + tickets. Aprende de cierres, ampliaciones, documentos y juego.</div></div></div></div>`}
function gameHtml(){const sc=scenarios[Math.floor(Math.random()*scenarios.length)];state.currentScenario=sc;const rank=state.scores.sort((a,b)=>(b.points||0)-(a.points||0)).slice(0,8);return `<div class="grid cols-2"><div class="card"><div class="section-title"><h2>Reto de calidad</h2><span>selecciona la mejor acción</span></div><div class="game-stage"><div class="scenario"><h3>Caso operativo</h3><p>${escapeHtml(sc.q)}</p></div><div class="answers">${sc.options.map((o,i)=>`<button class="answer" onclick="answerGame(${i})">${escapeHtml(o)}</button>`).join("")}</div></div></div><div class="card"><div class="section-title"><h2>Ranking</h2><span>marcos y elogios</span></div>${rank.length?`<div class="table-wrap"><table><thead><tr><th>Usuario</th><th>Puntos</th><th>Marco</th></tr></thead><tbody>${rank.map((r,i)=>`<tr><td>${escapeHtml(r.userName)}</td><td><strong>${r.points||0}</strong></td><td>${["🏆 Leyenda","🥇 Crack","🥈 Pro","🥉 Firme","⭐ En ascenso"][Math.min(i,4)]}</td></tr>`).join("")}</tbody></table></div>`:`<div class="empty">Aún no hay partidas. Resuelve el primer reto y abre el ranking.</div>`}</div></div>`}
function bindView(){if(state.view==="dashboard"){chartPair("chartStatus",countBy(state.tickets,"status"),"doughnut");chartPair("chartAssignee",countBy(state.tickets,"assignedTo",userName),"bar")}if(state.view==="tickets"){["fQ","fStatus","fAssignee","fPriority"].forEach(id=>document.getElementById(id).addEventListener("input",e=>{const map={fQ:"q",fStatus:"status",fAssignee:"assignee",fPriority:"priority"};state.filters[map[id]]=e.target.value;renderView()}))}if(state.view==="create"){document.getElementById("ticketForm").addEventListener("submit",submitTicket)}if(state.view==="team"){const uf=document.getElementById("userForm");if(uf)uf.addEventListener("submit",submitUser)}if(state.view==="kpis"){chartPair("chartCategory",countBy(state.tickets,"category"),"bar");chartPair("chartResponsible",countBy(state.tickets,"assignedTo",userName),"bar");chartPair("chartKStatus",countBy(state.tickets,"status"),"doughnut");chartPair("chartTime",avgTimeByResponsible(),"bar")}}
function countBy(rows,key,map){const out={};rows.forEach(r=>{const k=map?map(r[key])||"Sin dato":r[key]||"Sin dato";out[k]=(out[k]||0)+1});return out}
function avgTimeByResponsible(){const grouped={};state.tickets.filter(t=>["Resuelta","Cerrada"].includes(t.status)).forEach(t=>{const name=userName(t.assignedTo)||"Sin responsable";(grouped[name]||(grouped[name]=[])).push(hoursBetween(t.created_at,t.finishedAt||t.updated_at))});const out={};Object.keys(grouped).forEach(k=>out[k]=Number((grouped[k].reduce((a,b)=>a+b,0)/grouped[k].length).toFixed(1)));return out}
function chartPair(id,data,type){const el=document.getElementById(id);if(!el||!window.Chart)return;const labels=Object.keys(data);const values=Object.values(data);if(state.charts[id])state.charts[id].destroy();state.charts[id]=new Chart(el,{type,data:{labels:labels.length?labels:["Sin datos"],datasets:[{data:values.length?values:[0],borderWidth:1,borderRadius:10}]},options:{responsive:true,plugins:{legend:{display:type==="doughnut",position:"bottom"}},scales:type==="bar"?{y:{beginAtZero:true,ticks:{precision:0}}}:undefined}})}
async function submitTicket(e){e.preventDefault();const fd=new FormData(e.target);const code="DT-"+String(state.tickets.length+1).padStart(4,"0");const ticket={id:uid("ticket"),code,requesterName:fd.get("requesterName"),requesterEmail:fd.get("requesterEmail"),requesterArea:fd.get("requesterArea"),assignedTo:fd.get("assignedTo"),category:fd.get("category"),priority:fd.get("priority"),modality:fd.get("modality"),title:fd.get("title"),description:fd.get("description"),evidence:fd.get("evidence"),status:"Enviada",createdBy:state.user.id,acceptedAt:null,finishedAt:null,extendedReason:"",chat:[{by:state.user.name,text:"Solicitud radicada.",at:now()}],timeline:[{label:"Radicación",text:"Solicitud enviada al responsable.",at:now()}],created_at:now(),updated_at:now()};await saveRecord(tables.tickets,ticket);state.tickets=await listRecords(tables.tickets);popup("Solicitud enviada",`Tu código es ${code}. Guárdalo para consultar el estado. Ya está en la bandeja de ${userName(ticket.assignedTo)}.`,randomSentGif());e.target.reset();state.view=isInternal()?"tickets":"create";renderApp()}
function roleConfig(role){const key=role==="Analista de calidad"?"analista_calidad":role==="Jefe de auditoría interna"?"jefe_auditoria_interna":role==="Jefe general"?"jefe_general":role==="Super Admin / Desarrollador"?"super_admin":"solicitante";const canAnswer=role!=="Solicitante";return{roleKey:key,canAnswerTickets:canAnswer,canManageUsers:key==="super_admin",canSeeKPIs:canAnswer,canCloseTickets:canAnswer,canExtendWait:canAnswer,isSuperAdmin:key==="super_admin"}}
async function submitUser(e){e.preventDefault();if(!canManageUsers())return popup("Acceso restringido","Solo el Super Admin puede crear usuarios internos.",assets.missing);const fd=new FormData(e.target);const name=fd.get("name").trim();const role=fd.get("role");const perms=roleConfig(role);const user={id:slug(name)||uid("user"),name,role,...perms,area:fd.get("area"),pinHash:await hashPin(fd.get("pin")),avatar:fd.get("avatar")||assets.loginDance,statusText:fd.get("statusText")||"Disponible",active:true,created_at:now(),updated_at:now()};await saveRecord(tables.users,user);state.users=await listRecords(tables.users);toast("Usuario creado");renderApp()}
function openTicket(id){const t=state.tickets.find(x=>x.id===id);if(!t)return popup("No encontré la solicitud","La información no coincide con ningún ticket activo.",assets.missing);state.selectedTicket=t;document.getElementById("view").innerHTML=ticketDetailHtml(t);bindTicketDetail(t);if(["Enviada","Sin aceptar"].includes(t.status))popup("Aún no está aceptada","La solicitud ya fue enviada, pero todavía no aparece como aceptada por el responsable.",assets.working);if(t.modality==="Documental"&&t.status==="En proceso")popup("Documento en proceso","Esta solicitud no requiere presencialidad inmediata. El responsable está elaborando o revisando el entregable.",assets.document);gsap.from("#view .card",{opacity:0,y:20,duration:.35,stagger:.04})}
function lookupTicket(){const q=document.getElementById("lookupCode").value.trim().toLowerCase();const t=state.tickets.find(x=>(x.code||"").toLowerCase()===q||x.id.toLowerCase()===q);if(!t)return popup("No lo encontré","Ese código no coincide. Revisa si escribiste completo el consecutivo, por ejemplo DT-0001.",assets.missing);state.view="tickets";renderApp();openTicket(t.id)}
function ticketDetailHtml(t){return `<div class="ticket-view"><div class="card"><div class="section-title"><h2>${escapeHtml(t.code)} · ${escapeHtml(t.title)}</h2><span>${fmt(t.created_at)}</span></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${statusTag(t.status)}${priorityTag(t.priority)}<span class="tag blue">${escapeHtml(t.category)}</span><span class="tag gray">${escapeHtml(t.modality)}</span></div><p style="line-height:1.6;color:#46556b">${escapeHtml(t.description)}</p><div class="grid cols-2"><div class="field"><label>Origen</label><input value="${escapeHtml(t.requesterArea||"")}" disabled></div><div class="field"><label>Solicitante</label><input value="${escapeHtml(t.requesterName||"")}" disabled></div><div class="field"><label>Responsable</label><input value="${escapeHtml(userName(t.assignedTo)||"")}" disabled></div><div class="field"><label>Evidencia</label><input value="${escapeHtml(t.evidence||"Sin enlace")}" disabled></div></div><div class="section-title" style="margin-top:18px"><h2>Línea de tiempo</h2><span>${t.timeline?.length||0} eventos</span></div><div class="timeline">${(t.timeline||[]).map((s,i)=>`<div class="step"><div class="step-dot">${i+1}</div><div><strong>${escapeHtml(s.label)}</strong><p>${escapeHtml(s.text)} · ${fmt(s.at)}</p></div></div>`).join("")}</div><div class="top-actions" style="margin-top:18px">${ticketActions(t)}</div></div><div class="card"><div class="section-title"><h2>Chat de la solicitud</h2><span>conversación interna</span></div><div class="chat-box" id="chatBox">${(t.chat||[]).map(m=>`<div class="msg ${m.by===state.user.name?"me":""}">${escapeHtml(m.text)}<small>${escapeHtml(m.by)} · ${fmt(m.at)}</small></div>`).join("")}</div><div class="form" style="margin-top:12px"><div class="field"><label>Mensaje</label><textarea id="chatMsg" placeholder="Escribe una actualización, evidencia o pregunta"></textarea></div><button class="btn primary" onclick="sendChat('${t.id}')">Enviar mensaje</button></div></div></div>`}
function ticketActions(t){let actions=`<button class="btn ghost" onclick="setView('tickets')">Volver</button>`;if(isInternal()&&t.assignedTo===state.user.id&&["Enviada","Sin aceptar"].includes(t.status))actions+=`<button class="btn ok" onclick="acceptTicket('${t.id}')">Aceptar</button>`;if(isInternal()&&t.assignedTo===state.user.id&&["En proceso","Espera ampliada"].includes(t.status))actions+=`<button class="btn gold" onclick="extendTicket('${t.id}')">Ampliar espera</button><button class="btn ok" onclick="resolveTicket('${t.id}')">Resolver</button>`;if((hasLead()||t.createdBy===state.user.id)&&t.status==="Resuelta")actions+=`<button class="btn primary" onclick="closeTicket('${t.id}')">Cerrar y notificar</button>`;return actions}
function bindTicketDetail(t){setTimeout(()=>{const box=document.getElementById("chatBox");if(box)box.scrollTop=box.scrollHeight},50)}
async function updateTicket(t,label,text,status){t.status=status||t.status;t.updated_at=now();t.timeline=t.timeline||[];t.timeline.push({label,text,at:now()});await saveRecord(tables.tickets,t);state.tickets=await listRecords(tables.tickets);openTicket(t.id)}
async function acceptTicket(id){const t=state.tickets.find(x=>x.id===id);t.acceptedAt=now();t.chat=t.chat||[];t.chat.push({by:state.user.name,text:"Acepté la solicitud. Inicio gestión y revisión de alcance.",at:now()});await updateTicket(t,"Aceptación","Responsable aceptó la solicitud.","En proceso");toast("Solicitud aceptada")}
async function extendTicket(id){const t=state.tickets.find(x=>x.id===id);const res=await Swal.fire({title:"Ampliar espera",input:"textarea",inputLabel:"Comentario para el solicitante",inputPlaceholder:"Explica el motivo y la nueva expectativa",showCancelButton:true,confirmButtonText:"Guardar ampliación",confirmButtonColor:"#0d5bd2"});if(!res.value)return;t.extendedReason=res.value;t.chat=t.chat||[];t.chat.push({by:state.user.name,text:"Se amplía la espera: "+res.value,at:now()});await updateTicket(t,"Espera ampliada",res.value,"Espera ampliada");popup("Espera ampliada","El solicitante verá el comentario y la justificación de la nueva espera.",assets.extend)}
async function resolveTicket(id){const t=state.tickets.find(x=>x.id===id);t.finishedAt=now();t.chat=t.chat||[];t.chat.push({by:state.user.name,text:"Solicitud resuelta. Queda lista para validación y cierre.",at:now()});await updateTicket(t,"Resolución","Responsable marcó la solicitud como resuelta.","Resuelta");await autoLearn("cierre "+t.category,`Caso resuelto: ${t.title}. Aprendizaje: ${t.description}`);toast("Solicitud resuelta")}
async function closeTicket(id){const t=state.tickets.find(x=>x.id===id);t.finishedAt=t.finishedAt||now();t.chat=t.chat||[];t.chat.push({by:state.user.name,text:"Solicitud cerrada y notificada al solicitante.",at:now()});await updateTicket(t,"Cierre","Solicitud cerrada y notificada.","Cerrada");popup("¡Listo, esto ya quedó fino!","La solicitud fue cerrada. El Dream Team hizo de las suyas: trazabilidad completa, evidencia y cierre con estilo.",assets.done);if(window.confetti)confetti({particleCount:140,spread:85,origin:{y:.75}})}
async function sendChat(id){const t=state.tickets.find(x=>x.id===id);const msg=document.getElementById("chatMsg").value.trim();if(!msg)return;t.chat=t.chat||[];t.chat.push({by:state.user.name,text:msg,at:now()});t.updated_at=now();await saveRecord(tables.tickets,t);state.tickets=await listRecords(tables.tickets);openTicket(id)}
async function askAI(){const input=document.getElementById("aiPrompt");const q=input.value.trim();if(!q)return;state.aiHistory.push({me:true,text:q});const result=composeAI(q);state.aiHistory.push({me:false,text:result.answer});if(result.learn&&q.length>28){await autoLearn("interaccion,"+result.intent,`Pregunta frecuente: ${q}. Respuesta útil: ${result.answer.slice(0,900)}`)}input.value="";renderView();const chat=document.getElementById("aiChat");setTimeout(()=>chat.scrollTop=chat.scrollHeight,30)}
function normalizeTextAI(text){return String(text||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9ñ\s-]/g," ").replace(/\s+/g," ").trim()}
function tokensAI(text){return normalizeTextAI(text).split(" ").filter(t=>t.length>2&&!aiStopWords.has(t))}
function overlapScore(a,b){const A=new Set(tokensAI(a));const B=new Set(tokensAI(b));if(!A.size||!B.size)return 0;let hit=0;A.forEach(x=>{if(B.has(x))hit++});return hit/Math.sqrt(A.size*B.size)}
function keywordScore(q,keys){const clean=normalizeTextAI(q);if(!keys||!keys.length)return 0;let hits=0;keys.forEach(k=>{const kk=normalizeTextAI(k);if(kk&&clean.includes(kk))hits+=kk.split(" ").length>1?1.35:1});return Math.min(1,hits/Math.max(2,keys.length*.42))}
function inferIntent(q){const clean=normalizeTextAI(q);const rules=[
{intent:"radicacion",rx:/crear|radicar|solicitud|ticket|pedir|ayudame a redactar|convertir idea/},
{intent:"consulta",rx:/dt-|radicado|consultar|estado|buscar|no aparece/},
{intent:"auditoria",rx:/auditoria|hallazgo|no conformidad|accion correctiva|evidencia/},
{intent:"indicadores",rx:/kpi|indicador|productividad|grafica|dashboard|medir|pareto/},
{intent:"procedimiento",rx:/procedimiento|proceso|flujo|manual|caracterizacion/},
{intent:"documental",rx:/documento|pdf|formato|acta|matriz|archivo/},
{intent:"sla",rx:/tiempo|demora|espera|vencido|plazo|respuesta/},
{intent:"roles",rx:/rol|usuario|analista|jefe|solicitante|permiso/},
{intent:"ai_model",rx:/modelo matematico|scoring|algoritmo|clasificador|ia|chatbot|aprende/}
];return (rules.find(r=>r.rx.test(clean))||{intent:"general"}).intent}
function rankKnowledge(q){const intent=inferIntent(q);const qTokens=tokensAI(q).join(" ");const memoryRows=state.aiMemories.map(m=>({source:"Memoria",id:m.id,intent:m.intent||"memoria",keywords:String(m.key||"").split(/[,;]+/),answer:m.answer||"",route:m.route||"memory"}));const all=[...aiKnowledge.map(k=>({...k,source:"Base"})),...memoryRows];return all.map(k=>{const keyText=(k.keywords||[]).join(" ");const s1=keywordScore(q,k.keywords||[]);const s2=overlapScore(qTokens,keyText+" "+k.answer);const s3=k.intent===intent?1:0;const score=.48*s1+.32*s2+.20*s3;return {...k,score}}).sort((a,b)=>b.score-a.score)}
function findTicketAI(q){const clean=normalizeTextAI(q);const code=(clean.match(/dt-?\s*\d{1,6}/)||[])[0];if(code){const compact=code.replace(/\s+/g,"").toUpperCase().replace("DT","DT-");const t=state.tickets.find(x=>normalizeTextAI(x.code)===normalizeTextAI(compact)||normalizeTextAI(x.code).replace("-","")===normalizeTextAI(compact).replace("-",""));if(t)return t}const ranked=state.tickets.map(t=>({t,score:overlapScore(q,[t.code,t.title,t.description,t.category,t.requesterName,t.requesterArea,userName(t.assignedTo)].join(" "))})).sort((a,b)=>b.score-a.score);return ranked[0]?.score>.28?ranked[0].t:null}
function draftTicketFromText(text){const clean=normalizeTextAI(text);const category=clean.match(/auditoria|hallazgo|no conformidad/) ? "Auditoría" : clean.match(/indicador|kpi|dashboard|grafica|medir/) ? "Indicador/KPI" : clean.match(/capacitacion|induccion|entrenamiento/) ? "Capacitación" : clean.match(/riesgo|control/) ? "Riesgo/Hallazgo" : clean.match(/documento|formato|pdf|acta|matriz/) ? "Documento" : clean.match(/procedimiento|proceso|flujo|manual/) ? "Procedimiento" : clean.match(/mejora|optimizar/) ? "Mejora continua" : "Consulta general";
const priority=clean.match(/urgente|critica|crítica|auditoria|vencido|bloquea|gerencia/) ? "Alta" : clean.match(/simple|consulta|cuando puedan|baja/) ? "Baja" : "Media";
const modality=clean.match(/visita|presencial|campo|reunion|reunión|acompañamiento/) ? "Presencial" : clean.match(/documento|formato|pdf|acta|matriz|procedimiento/) ? "Documental" : "Mixta";
const title=makeTitleFromText(text,category);
const assignee=suggestAssignee(category,priority);
const description=`Necesidad identificada: ${text.trim()}\n\nResultado esperado: recibir orientación, ajuste, revisión o soporte del área de Calidad y Mejora Continua según el alcance de la solicitud.\n\nInformación mínima sugerida: proceso afectado, evidencia disponible, plazo esperado, impacto y persona de contacto.\n\nCriterio de cierre: dejar evidencia del análisis realizado, respuesta entregada y validación del solicitante.`;
return {category,priority,modality,title,description,assignedTo:assignee}}
function makeTitleFromText(text,category){const clean=String(text||"").replace(/\s+/g," ").trim();let first=clean.split(/[\.\n]/)[0].slice(0,86);if(first.length<12)first=`Solicitud de ${category.toLowerCase()}`;return first.charAt(0).toUpperCase()+first.slice(1)}
function suggestAssignee(category,priority){const jefe=state.users.find(u=>u.role==="Jefe general");const audit=state.users.find(u=>u.role.includes("auditoría")||u.role.includes("auditoria"));const analysts=state.users.filter(u=>u.role==="Analista de calidad");if(priority==="Alta"&&jefe)return jefe.id;if(["Auditoría","Riesgo/Hallazgo"].includes(category)&&audit)return audit.id;return (analysts[0]||jefe||audit||state.users[0]||{}).id||""}
function composeAI(q){const intent=inferIntent(q);const ticket=findTicketAI(q);if(ticket){return {intent,learn:false,answer:`Encontré una solicitud relacionada: ${ticket.code} · ${ticket.title}.\n\nEstado actual: ${ticket.status}.\nResponsable: ${userName(ticket.assignedTo)||"sin asignar"}.\nOrigen: ${ticket.requesterArea||"sin dato"}.\nÚltima actualización: ${fmt(ticket.updated_at)}.\n\nSiguiente lectura recomendada: revisa la línea de tiempo y el chat para confirmar si falta evidencia, aceptación o cierre.`}}
if(intent==="radicacion"||/crear|radicar|ticket|solicitud|redactar|convertir/i.test(q)){const d=draftTicketFromText(q);return {intent,learn:true,answer:`Te dejo un borrador listo para radicar:\n\nAsunto: ${d.title}\nCategoría: ${d.category}\nPrioridad: ${d.priority}\nModalidad: ${d.modality}\nResponsable sugerido: ${userName(d.assignedTo)||"por definir"}\n\nDescripción sugerida:\n${d.description}\n\nTip: copia esto al formulario o usa el botón \"Crear borrador con IA\" en Nueva solicitud para que el sistema complete los campos.`}}
const ranked=rankKnowledge(q);const top=ranked[0];const second=ranked[1];if(top&&top.score>.18){let confidence=top.score>.62?"alta":top.score>.38?"media":"orientativa";let answer=`${top.answer}\n\nLectura IA: intención detectada ${intent}; confianza ${confidence}; fuente ${top.source}.`;if(second&&second.score>.22&&second.id!==top.id)answer+=`\n\nTambién puede servir: ${second.answer}`;return {intent,learn:top.score<.42,answer}}
const d=draftTicketFromText(q);return {intent,learn:true,answer:`No tengo una coincidencia exacta todavía, pero puedo ayudarte a aterrizarlo. Por lo que escribiste, lo clasificaría así:\n\nAsunto: ${d.title}\nCategoría probable: ${d.category}\nPrioridad probable: ${d.priority}\nModalidad probable: ${d.modality}\nResponsable sugerido: ${userName(d.assignedTo)||"por definir"}\n\nPara responder mejor necesito: proceso de origen, evidencia disponible, plazo esperado e impacto de no atenderlo.`}}
function generateTicketDraft(){const idea=document.getElementById("draftIdea")?.value.trim();if(!idea)return popup("Falta la idea","Escribe la necesidad en lenguaje normal para que la IA arme el borrador.",assets.missing);const d=draftTicketFromText(idea);const form=document.getElementById("ticketForm");if(!form)return;form.elements["category"].value=d.category;form.elements["priority"].value=d.priority;form.elements["modality"].value=d.modality;if(d.assignedTo)form.elements["assignedTo"].value=d.assignedTo;form.elements["title"].value=d.title;form.elements["description"].value=d.description;popup("Borrador creado","La IA completó asunto, categoría, prioridad, modalidad, descripción y responsable sugerido. Revisa los datos y envía la solicitud.",assets.sent[0]);autoLearn("borrador solicitud,"+d.category,`Idea convertida en solicitud. Asunto: ${d.title}. Categoría: ${d.category}. Prioridad: ${d.priority}.`)}
async function manualLearn(){const key=document.getElementById("learnKey").value.trim();const answer=document.getElementById("learnAnswer").value.trim();if(!key||!answer)return popup("Falta información","Agrega una palabra clave y la respuesta esperada para entrenar la IA.",assets.missing);await autoLearn(key,answer);document.getElementById("learnKey").value="";document.getElementById("learnAnswer").value="";toast("Memoria guardada");renderView()}
async function autoLearn(key,answer){const item={id:uid("mem"),key,answer,createdBy:state.user?.name||"Sistema",created_at:now(),updated_at:now()};await saveRecord(tables.ai,item);state.aiMemories=await listRecords(tables.ai)}
async function learnFromFile(){const file=document.getElementById("knowledgeFile").files[0];if(!file)return popup("No hay archivo","Selecciona un PDF, TXT, CSV, JSON o Markdown para alimentar la base de conocimiento.",assets.missing);let text="";if(file.type==="application/pdf"||file.name.toLowerCase().endsWith(".pdf")){text=await readPdf(file)}else{text=await file.text()}const compact=text.replace(/\s+/g," ").trim().slice(0,4200);if(!compact)return popup("Archivo sin texto","No pude extraer texto útil del documento.",assets.missing);await autoLearn(file.name,`Aprendizaje desde documento ${file.name}: ${compact}`);popup("Documento leído","La IA incorporó el contenido del archivo a su base de respuestas internas.",assets.document);renderView()}
async function readPdf(file){if(!window.pdfjsLib){return ""}const buf=await file.arrayBuffer();const pdf=await window.pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;let out="";for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const content=await page.getTextContent();out+=content.items.map(it=>it.str).join(" ")+"\n"}return out}
async function answerGame(ix){const sc=state.currentScenario;if(!sc)return;const ok=ix===sc.ok;let score=state.scores.find(s=>s.userId===state.user.id);if(!score)score={id:uid("score"),userId:state.user.id,userName:state.user.name,points:0,created_at:now(),updated_at:now()};score.points=(score.points||0)+(ok?10:2);score.updated_at=now();await saveRecord(tables.scores,score);await autoLearn("juego calidad",sc.learn);state.scores=await listRecords(tables.scores);if(ok){popup("Respuesta potente","Sumaste 10 puntos. Este criterio quedó reforzado en la memoria de la IA.",assets.sent[1]);if(window.confetti)confetti({particleCount:90,spread:70,origin:{y:.75}})}else{popup("Casi, pero no era la mejor ruta","Sumaste 2 puntos por participar. Revisa la trazabilidad: la mejor acción era: "+sc.options[sc.ok],assets.extend)}renderView()}
window.setView=setView;window.toggleMenu=toggleMenu;window.logout=logout;window.refreshData=refreshData;window.openTicket=openTicket;window.lookupTicket=lookupTicket;window.acceptTicket=acceptTicket;window.extendTicket=extendTicket;window.resolveTicket=resolveTicket;window.closeTicket=closeTicket;window.sendChat=sendChat;window.askAI=askAI;window.manualLearn=manualLearn;window.learnFromFile=learnFromFile;window.generateTicketDraft=generateTicketDraft;window.answerGame=answerGame;
window.addEventListener("DOMContentLoaded",async()=>{if(window.pdfjsLib)window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/build/pdf.worker.min.mjs";await seed();setupLogin()});
