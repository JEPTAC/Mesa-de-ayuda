function guidedBuildDraft(data){
  const combined=`Área o proceso: ${data.area}. Necesidad: ${data.need}. Tipo de caso o documento: ${data.caseType}. Evidencia disponible: ${data.evidence}. Resultado esperado: ${data.expected}. Urgencia o plazo: ${data.urgency}.`;
  const draft=draftTicketFromText(combined);
  const classification=typeof classifyFromText==="function"?classifyFromText(combined):null;
  if(classification){
    draft.category=classification.category||draft.category;
    draft.priority=classification.priority||draft.priority;
    draft.modality=classification.modality||draft.modality;
    draft.assignedTo=suggestAssignee(draft.category,draft.priority);
  }
  draft.requesterName=data.requesterName||draft.requesterName||"";
  draft.requesterEmail=data.requesterEmail||draft.requesterEmail||"";
  draft.requesterArea=data.area;
  draft.evidenceHint=data.evidence&&data.evidence!=="No tengo evidencia todavía"?data.evidence:"";
  draft.title=makeTitleFromText(data.need,draft.category);
  draft.description=`Necesidad identificada: ${data.need}

Área o proceso de origen: ${data.area}

Tipo de caso o documento: ${data.caseType}

Evidencia disponible: ${data.evidence}

Resultado esperado: ${data.expected}

Urgencia o plazo: ${data.urgency}

Clasificación sugerida por IA: ${draft.category}, prioridad ${draft.priority}, modalidad ${draft.modality}.

Responsable sugerido: ${userName(draft.assignedTo)}.

Criterio de cierre: respuesta entregada con trazabilidad, evidencia revisada y validación del solicitante.`;
  return draft;
}
function applyGuidedDraft(draft){
  const form=document.getElementById("ticketForm");
  if(!form)return;
  if(form.elements["requesterName"]&&draft.requesterName)form.elements["requesterName"].value=draft.requesterName;
  if(form.elements["requesterEmail"]&&draft.requesterEmail)form.elements["requesterEmail"].value=draft.requesterEmail;
  if(form.elements["requesterArea"])form.elements["requesterArea"].value=draft.requesterArea||"";
  if(form.elements["category"])form.elements["category"].value=draft.category||"Consulta general";
  if(form.elements["priority"])form.elements["priority"].value=draft.priority||"Media";
  if(form.elements["modality"])form.elements["modality"].value=draft.modality||"Mixta";
  if(form.elements["assignedTo"]&&draft.assignedTo)form.elements["assignedTo"].value=draft.assignedTo;
  if(form.elements["title"])form.elements["title"].value=draft.title||"";
  if(form.elements["description"])form.elements["description"].value=draft.description||"";
  if(form.elements["evidence"]&&draft.evidenceHint)form.elements["evidence"].value=draft.evidenceHint;
  state.pendingDraft=draft;
  renderQualityPreview();
}
async function startGuidedRadication(fromOffer=false){
  const current=guidedCurrentFormData();
  const data={};
  if(state.user?.role==="Solicitante"){
    data.requesterName=await guidedAskStep({title:"Dato del solicitante",text:"Primero, escribe tu nombre completo.",placeholder:"Nombre del solicitante",value:current.requesterName});

    data.requesterEmail=await guidedAskStep({title:"Correo",text:"Escribe tu correo para seguimiento. Si no tienes, puedes dejarlo vacío.",placeholder:"correo@empresa.com",value:current.requesterEmail,required:false});
    if(data.requesterEmail===null)return;
  }else{
    data.requesterName=current.requesterName||state.user?.name||"";

  }
  data.area=await guidedAskStep({title:"1 de 5 · Área o proceso",text:"¿De qué área o proceso viene la solicitud?",placeholder:"Ej. Cartera, logística, ventas, producción",value:current.requesterArea});
  if(data.area===null)return;
  data.need=await guidedAskStep({title:"2 de 5 · Necesidad",text:"Cuéntame en una frase qué necesitas o qué problema ocurrió.",input:"textarea",placeholder:"Ej. No puedo subir el PDF de una factura y se queda cargando",value:current.description||current.title});
  if(data.need===null)return;
  data.caseType=await guidedAskStep({title:"3 de 5 · Tipo de caso",text:"Selecciona lo que más se parece a tu caso.",options:["Documento","Procedimiento","Auditoría","Indicador/KPI","Riesgo/Hallazgo","Capacitación","Mejora continua","Consulta general"],value:current.category||"Documento"});
  if(data.caseType===null)return;
  data.evidence=await guidedAskStep({title:"4 de 5 · Evidencia",text:"¿Tienes evidencia, enlace, captura, PDF, acta, matriz o archivo?",input:"textarea",placeholder:"Ej. Tengo captura y PDF / No tengo evidencia todavía",value:current.evidence||""});
  if(data.evidence===null)return;
  data.expected=await guidedAskStep({title:"5 de 5 · Resultado esperado",text:"¿Qué esperas que entregue el equipo de Calidad?",input:"textarea",placeholder:"Ej. Que revisen el documento, indiquen responsable y dejen respuesta trazable"});
  if(data.expected===null)return;
  data.urgency=await guidedAskStep({title:"Urgencia o plazo",text:"¿Tiene fecha límite o urgencia?",placeholder:"Ej. Esta semana / Auditoría mañana / Sin urgencia",required:false});
  if(data.urgency===null)return;
  if(!data.urgency)data.urgency="Sin urgencia indicada";

  const draft=guidedBuildDraft(data);
  applyGuidedDraft(draft);
  const quality=ticketQualityFromObject(collectTicketFormObject());
  const missing=quality.misses.slice(0,4);
  await Swal.fire({
    title:"Solicitud organizada",
    html:`<div class="wizard-summary"><p><strong>Asunto:</strong> ${escapeHtml(draft.title)}</p><p><strong>Categoría:</strong> ${escapeHtml(draft.category)} · <strong>Prioridad:</strong> ${escapeHtml(draft.priority)} · <strong>Modalidad:</strong> ${escapeHtml(draft.modality)}</p><p><strong>Responsable sugerido:</strong> ${escapeHtml(userName(draft.assignedTo))}</p><p><strong>Calidad de radicación:</strong> ${quality.score}%</p>${missing.length?`<p><strong>Antes de enviar, puedes mejorar:</strong></p><ul>${missing.map(m=>`<li>${escapeHtml(m)}</li>`).join("")}</ul>`:`<p>La solicitud quedó lista para revisión y envío.</p>`}</div>`,
    confirmButtonText:"Revisar y enviar",
    confirmButtonColor:"#0d5bd2"
  });
}

/* =========================================================
   CORRECCIÓN REDACCIÓN IA + COMPROBANTE/PDF/CORREO
   - Descripciones en párrafo formal, sin subtítulos internos.
   - Comprobante PDF/HTML más elegante.
   - Correo sin SQL: abre borrador en el cliente de correo.
   ========================================================= */

function sanitizeFormalText(text){
  return String(text||"").replace(/\s+/g," ").trim();
}
function buildFormalTicketDescription(data,draft={}){
  const area=sanitizeFormalText(data.area||data.requesterArea||"el área solicitante");
  const need=sanitizeFormalText(data.need||data.problem||data.description||"se requiere apoyo del proceso de Calidad y Mejoramiento Continuo");
  const caseType=sanitizeFormalText(data.caseType||draft.category||"solicitud");
  const evidence=sanitizeFormalText(data.evidence||data.evidenceHint||"la evidencia disponible será aportada por el solicitante cuando aplique");
  const expected=sanitizeFormalText(data.expected||"recibir una revisión clara, trazable y orientada al cierre de la necesidad reportada");
  const urgency=sanitizeFormalText(data.urgency||"sin urgencia específica informada");
  const responsible=userName(draft.assignedTo)||"el responsable asignado";

  return `Desde ${area} se solicita apoyo del proceso de Calidad y Mejoramiento Continuo para atender una necesidad relacionada con ${caseType.toLowerCase()}. El caso reportado consiste en ${need}. Para la revisión se cuenta como referencia con ${evidence}, y se espera ${expected}. La solicitud se gestiona con prioridad ${draft.priority||"Media"} y modalidad ${draft.modality||"Mixta"}, considerando como plazo o nivel de urgencia ${urgency}. Se sugiere asignar la atención a ${responsible}, dejando como criterio de cierre una respuesta trazable, la revisión de la evidencia disponible y la validación del solicitante.`;
}
function draftTicketFromText(text){
  const raw=String(text||"").trim();
  const clean=typeof aiCleanText==="function"?aiCleanText(raw):normalizeTextAI(raw);
  const entities=typeof aiExtractEntities==="function"?aiExtractEntities(raw):{};
  const category=typeof classifyCategoryMax==="function"?classifyCategoryMax(clean):(/auditoria|hallazgo|no conformidad/.test(clean)?'Auditoría':/indicador|kpi|dashboard|grafica|medir/.test(clean)?'Indicador/KPI':/capacitacion|induccion|entrenamiento/.test(clean)?'Capacitación':/riesgo|control/.test(clean)?'Riesgo/Hallazgo':/documento|formato|pdf|acta|matriz/.test(clean)?'Documento':/procedimiento|proceso|flujo|manual/.test(clean)?'Procedimiento':/mejora|optimizar/.test(clean)?'Mejora continua':'Consulta general');
  const priority=typeof classifyPriorityMax==="function"?classifyPriorityMax(clean,entities):(/urgente|critica|auditoria|vencido|bloquea|gerencia/.test(clean)?'Alta':/simple|consulta|cuando puedan|baja/.test(clean)?'Baja':'Media');
  const modality=typeof classifyModalityMax==="function"?classifyModalityMax(clean):(/visita|presencial|campo|reunion|acompanamiento/.test(clean)?'Presencial':/documento|formato|pdf|acta|matriz|procedimiento/.test(clean)?'Documental':'Mixta');
  const assignedTo=suggestAssignee(category,priority);
  const title=makeTitleFromText(raw,category);
  const draft={category,priority,modality,title,assignedTo,requesterName:entities.requesterName||"",requesterEmail:entities.email||"",requesterArea:entities.requesterArea||"",evidenceHint:entities.evidence?"Evidencia mencionada por el solicitante. Adjuntar soporte si está disponible.":""};
  draft.description=buildFormalTicketDescription({area:entities.requesterArea,need:raw,caseType:category,evidence:draft.evidenceHint||"",expected:"recibir revisión, orientación, ajuste o soporte según el alcance del caso",urgency:entities.deadline||""},draft);
  return draft;
}
function guidedBuildDraft(data){
  const combined=`${data.area||""} ${data.need||""} ${data.caseType||""} ${data.evidence||""} ${data.expected||""} ${data.urgency||""}`;
  const draft=draftTicketFromText(combined);
  const classification=typeof classifyFromText==="function"?classifyFromText(combined):null;
  if(classification){
    draft.category=classification.category||draft.category;
    draft.priority=classification.priority||draft.priority;
    draft.modality=classification.modality||draft.modality;
    draft.assignedTo=suggestAssignee(draft.category,draft.priority);
  }
  draft.requesterName=data.requesterName||draft.requesterName||"";
  draft.requesterEmail=data.requesterEmail||draft.requesterEmail||"";
  draft.requesterArea=data.area||"";
  draft.evidenceHint=data.evidence&&data.evidence!=="No tengo evidencia todavía"?data.evidence:"";
  draft.title=makeTitleFromText(data.need,draft.category);
  draft.description=buildFormalTicketDescription(data,draft);
  return draft;
}

function loadScriptOnce(src){
  return new Promise((resolve,reject)=>{
    if([...document.scripts].some(s=>s.src===src))return resolve();
    const s=document.createElement("script");
    s.src=src;s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
  });
}

  if(!hasEmailConfig())return false;

  if(window.emailjs&&cfg.publicKey)window.emailjs.init({publicKey:cfg.publicKey});

}

async function sendTicketEmailAutomatic(t,type="created",silent=false){
  const email=String(t.requesterEmail||"").trim();
  if(!email){
    if(!silent)Swal.fire({title:"Sin correo",text:"La solicitud no tiene correo del solicitante.",confirmButtonColor:"#0d5bd2"});
    return {ok:false,reason:"sin_correo"};
  }
  if(!hasEmailConfig()){
    if(!silent){
      const cfg=await Swal.fire({title:"Correo automático no configurado",html:`<div class="wizard-summary"><p>Para que el comprobante llegue solo al correo del solicitante, primero configura el proveedor de correo. Después de eso, los comprobantes se enviarán automáticamente.</p></div>`,showCancelButton:true,confirmButtonText:"Configurar ahora",cancelButtonText:"Después",confirmButtonColor:"#0d5bd2"});
      if(cfg.isConfirmed)await configureEmailService();
    }
    return {ok:false,reason:"sin_config"};
  }
  try{
    await ensureEmailProvider();
    const cfg=getEmailConfig();
    const params={
      to_email:email,
      subject:ticketEmailSubject(t,type),
      ticket_code:t.code,
      requester_name:t.requesterName||"",
      html_message:ticketEmailHtml(t,type),
      text_message:ticketTextMessage(t,type)
    };
    await window.emailjs.send(cfg.serviceId,cfg.templateId,params);
    t.emailLog=t.emailLog||[];
    t.emailLog.push({type,status:"sent",to:email,at:now(),provider:"EmailJS"});
    await saveRecord(tables.tickets,t);
    state.tickets=await listRecords(tables.tickets);
    if(!silent)toast("Correo enviado al solicitante");
    return {ok:true};
  }catch(err){
    console.warn("Error enviando correo",err);
    t.emailLog=t.emailLog||[];
    t.emailLog.push({type,status:"failed",to:email,at:now(),provider:"EmailJS",error:String(err?.text||err?.message||err)});
    try{await saveRecord(tables.tickets,t);state.tickets=await listRecords(tables.tickets)}catch(e){}
    if(!silent)Swal.fire({title:"No se pudo enviar",text:"Revisa la configuración del proveedor de correo o la plantilla.",confirmButtonColor:"#0d5bd2"});
    return {ok:false,reason:"error"};
  }
}

async function sendTicketEmailAutomatic(t,type="created",silent=false){
  if(type!=="created"){
    return {ok:false,reason:"solo_creacion"};
  }
  const email=String(t.requesterEmail||"").trim();
  if(!email){
    if(!silent)Swal.fire({title:"Sin correo",text:"La solicitud no tiene correo del solicitante.",confirmButtonColor:"#0d5bd2"});
    return {ok:false,reason:"sin_correo"};
  }
  if(!hasEmailConfig()){
    if(!silent){
      const cfg=await Swal.fire({title:"Comprobante automático no configurado",html:`<div class="wizard-summary"><p>Para que el comprobante llegue automáticamente al correo del solicitante, configura EmailJS una sola vez. El Service ID ya queda precargado como <strong>${EMAILJS_DEFAULT_SERVICE_ID}</strong>.</p></div>`,showCancelButton:true,confirmButtonText:"Configurar ahora",cancelButtonText:"Después",confirmButtonColor:"#0d5bd2"});
      if(cfg.isConfirmed)await configureEmailService();
    }
    return {ok:false,reason:"sin_config"};
  }
  try{
    await ensureEmailProvider();
    const cfg=getEmailConfig();
    const params={
      to_email:email,
      subject:ticketEmailSubject(t,"created"),
      ticket_code:t.code,
      requester_name:t.requesterName||"",
      html_message:ticketEmailHtml(t,"created"),
      text_message:ticketTextMessage(t,"created")
    };
    await window.emailjs.send(cfg.serviceId,cfg.templateId,params);
    t.emailLog=t.emailLog||[];
    t.emailLog.push({type:"created",status:"sent",to:email,at:now(),provider:"EmailJS",serviceId:cfg.serviceId});
    await saveRecord(tables.tickets,t);
    state.tickets=await listRecords(tables.tickets);
    if(!silent)toast("Comprobante enviado al solicitante");
    return {ok:true};
  }catch(err){
    console.warn("Error enviando comprobante",err);
    t.emailLog=t.emailLog||[];
    t.emailLog.push({type:"created",status:"failed",to:email,at:now(),provider:"EmailJS",error:String(err?.text||err?.message||err)});
    try{await saveRecord(tables.tickets,t);state.tickets=await listRecords(tables.tickets)}catch(e){}
    if(!silent)Swal.fire({title:"No se pudo enviar el comprobante",text:"Revisa la Public Key, Template ID y plantilla de EmailJS.",confirmButtonColor:"#0d5bd2"});
    return {ok:false,reason:"error"};
  }
}

   ========================================================= */
function isQualityAuditUser(){
  const role=String(state.user?.role||"").toLowerCase();
  return isInternal() || /calidad|auditor|analista|jefe|admin|desarrollador/.test(role);
}
function semaforoInfo(t){
  const status=String(t?.status||"");
  if(["Enviada","Sin aceptar"].includes(status)){
    return {color:"red",label:"Pendiente por aceptar",hint:"Debe aceptarse antes de gestionar"};
  }
  if(status==="En proceso"){
    return {color:"blue",label:"Aceptada / en gestión",hint:"Ya puede organizarse y resolverse"};
  }
  if(status==="Espera ampliada"){
    return {color:"yellow",label:"Pendiente ampliado",hint:"Tiene espera justificada"};
  }
  if(status==="Resuelta"){
    return {color:"green",label:"Resuelta por validar",hint:"Lista para cierre"};
  }
  if(status==="Cerrada"){
    return {color:"green",label:"Cerrada",hint:"Gestión finalizada"};
  }
  return {color:"yellow",label:status||"Pendiente",hint:"Revisar estado"};
}
function semaforoBadge(t){
  const s=semaforoInfo(t);
  return `<span class="semaforo-badge ${s.color}" title="${escapeHtml(s.hint)}">${escapeHtml(s.label)}</span>`;
}
function semaforoStats(rows){
  const list=rows||state.tickets||[];
  return {
    sent:list.filter(t=>["Enviada","Sin aceptar"].includes(t.status)).length,
    pending:list.filter(t=>["En proceso","Espera ampliada"].includes(t.status)).length,
    resolved:list.filter(t=>t.status==="Resuelta").length,
    closed:list.filter(t=>t.status==="Cerrada").length
  };
}
function semaforoBoardHtml(rows){
  if(!isQualityAuditUser())return "";
  const s=semaforoStats(rows);
  return `<div class="semaforo-board"><div class="semaforo-card red"><small>Enviado</small><strong>${s.sent}</strong><span>Pendiente por aceptar</span></div><div class="semaforo-card blue"><small>Pendiente</small><strong>${s.pending}</strong><span>En gestión o espera</span></div><div class="semaforo-card green"><small>Resuelto</small><strong>${s.resolved}</strong><span>Por validar / cerrar</span></div><div class="semaforo-card green"><small>Cerrado</small><strong>${s.closed}</strong><span>Finalizado</span></div></div>`;
}
function acceptGateHtml(t){
  if(!isInternal())return "";
  const s=semaforoInfo(t);
  if(["Enviada","Sin aceptar"].includes(t.status)){

    return `<div class="accept-gate"><h3>🟡 Solicitud enviada, pendiente por aceptar</h3><p>Antes de organizar, ampliar espera o resolver, el responsable debe presionar <strong>Aceptar solicitud</strong>. Esto deja trazabilidad de inicio de gestión y evita cierres sin aceptación.</p><div class="valor-actions">${assignedToMe?`<button class="btn ok" onclick="acceptTicket('${t.id}')">Aceptar solicitud</button>`:`<button class="btn ghost" disabled>Debe aceptar: ${escapeHtml(userName(t.assignedTo))}</button>`}</div></div>`;

    return `<div class="accept-gate" style="background:linear-gradient(135deg,#eaf2ff,#ffffff);border-color:rgba(13,91,210,.22)"><h3>🔵 Solicitud aceptada y en gestión</h3><p>La solicitud ya fue aceptada. Ahora puede organizarse, ampliarse si aplica o marcarse como resuelta por el responsable asignado.</p></div>`;

  return "";
}

  if(t.assignedTo!==state.user?.id && !hasLead()){

  if(!["Enviada","Sin aceptar"].includes(t.status)){

  const res=await Swal.fire({

};

const resolveTicketBeforeSemaforo=resolveTicket;
resolveTicket=async function(id){
  const t=state.tickets.find(x=>x.id===id);if(!t)return;
  if(["Enviada","Sin aceptar"].includes(t.status)){
    popup("Primero debes aceptar la solicitud","Para resolverla, primero presiona “Aceptar solicitud”. Así queda trazabilidad del inicio de gestión.",assets.missing);
    return;
  }
  if(!["En proceso","Espera ampliada"].includes(t.status)){
    popup("Estado no permitido","Solo se puede resolver una solicitud que esté en proceso o en espera ampliada.",assets.missing);
    return;
  }
  if(t.assignedTo!==state.user?.id && !hasLead()){
    popup("No puedes resolver esta solicitud","Solo el responsable asignado o un líder autorizado puede resolverla.",assets.missing);
    return;
  }
  return resolveTicketBeforeSemaforo(id);
};

ticketActions=function(t){

  if(isInternal() && (t.assignedTo===state.user.id || hasLead()) && ['En proceso','Espera ampliada'].includes(t.status))actions+=`<button class="btn gold" onclick="extendTicket('${t.id}')">Ampliar espera</button><button class="btn ok" onclick="resolveTicket('${t.id}')">Resolver</button>`;

};


/* =========================================================
   PRUEBA AUTOMÁTICA DIARIA PARA ALIMENTAR SUPABASE
   - Crea 1 ticket aleatorio diario.
   - Lo acepta, resuelve y cierra automáticamente.
   - No envía correo.
   - No requiere SQL.
   Nota: en GitHub Pages se ejecuta cuando alguien abre la app.
   ========================================================= */
const DAILY_AUTO_TEST_VERSION="Prueba automática diaria · tickets cerrados";
const DAILY_AUTO_TEST_ENABLED=true;

function autoTestDayKey(date=new Date()){
  return date.toISOString().slice(0,10);
}
function autoTestIdForDay(day=autoTestDayKey()){
  return "auto_test_"+day.replaceAll("-","");
}
function randPick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}
function randomPastIso(baseDate, hourMin=7, hourMax=11){
  const d=new Date(baseDate);
  d.setHours(hourMin+Math.floor(Math.random()*(hourMax-hourMin+1)),Math.floor(Math.random()*50),0,0);
  return d.toISOString();
}
function addMinutesIso(iso,mins){
  return new Date(new Date(iso).getTime()+mins*60000).toISOString();
}
function dailyAutoTestKnowledge(){
  return [
    {
      category:"Documento",
      title:"Prueba diaria de actualización documental",
      area:"Calidad",
      desc:"Desde el proceso de Calidad se realiza una prueba automática de trazabilidad para validar el registro, asignación, aceptación, resolución y cierre de una solicitud documental dentro de la mesa de ayuda."
    },
    {
      category:"Auditoría",
      title:"Prueba diaria de seguimiento de auditoría",
      area:"Auditoría interna",
      desc:"Desde auditoría interna se genera una prueba automática para verificar que el flujo de atención registre aceptación, respuesta, evidencia de gestión y cierre con trazabilidad."
    },
    {
      category:"Indicador/KPI",
      title:"Prueba diaria de revisión de indicador",
      area:"Mejoramiento continuo",
      desc:"Desde mejoramiento continuo se registra una prueba automática para alimentar los indicadores de gestión, validar tiempos de respuesta y confirmar comportamiento del tablero."
    },
    {
      category:"Mejora continua",
      title:"Prueba diaria de mejora operativa",
      area:"Calidad y mejora continua",
      desc:"Se ejecuta una prueba automática para validar que la plataforma conserve la trazabilidad de una mejora operativa desde la radicación hasta el cierre."
    },
    {
      category:"Procedimiento",
      title:"Prueba diaria de revisión de procedimiento",
      area:"Gestión documental",
      desc:"Desde gestión documental se crea una prueba automática para verificar el comportamiento del flujo asociado a procedimientos, responsables y cierre controlado."
    }
  ];
}
function shouldCreateDailyAutoTest(){
  if(!DAILY_AUTO_TEST_ENABLED)return false;
  if(!Array.isArray(state.tickets))return false;
  const today=autoTestDayKey();
  return !state.tickets.some(t=>t.autoTest===true && t.autoTestDay===today);
}
async function createDailyAutoTestTicket(){
  if(!shouldCreateDailyAutoTest())return null;
  const today=autoTestDayKey();
  const data=randPick(dailyAutoTestKnowledge());
  const responsible=randPick(responders()) || state.users.find(u=>u.id===state.user?.id) || {id:state.user?.id||"admin",name:state.user?.name||"Sistema"};
  const created=randomPastIso(new Date(),7,8);
  const accepted=addMinutesIso(created,10+Math.floor(Math.random()*20));
  const resolved=addMinutesIso(accepted,35+Math.floor(Math.random()*110));
  const closed=addMinutesIso(resolved,10+Math.floor(Math.random()*30));
  const priority=randPick(["Baja","Media","Media","Alta"]);
  const modality=data.category==="Auditoría"?"Mixta":"Documental";
  const id=autoTestIdForDay(today);
  const ticket={
    id,
    code:'DT-'+String(maxTicketCode()+1).padStart(4,'0'),
    autoTest:true,
    autoTestDay:today,
    requesterName:"Prueba automática del sistema",
    requesterEmail:"",
    requesterArea:data.area,
    assignedTo:responsible.id,
    category:data.category,
    priority,
    modality,
    title:data.title,
    description:data.desc+" Esta solicitud se genera de forma controlada para alimentar Supabase, probar indicadores diarios y verificar que el flujo completo se mantenga funcional sin afectar solicitudes reales.",
    evidence:"Prueba automática sin evidencia externa",
    attachments:[],
    resolutionFiles:[],
    templateData:{origen:"prueba_automatica_diaria"},
    status:"Cerrada",
    createdBy:"sistema_prueba_diaria",
    acceptedAt:accepted,
    finishedAt:resolved,
    extendedReason:"",
    satisfaction:{score:5,comment:"Prueba automática cerrada correctamente.",at:closed,by:"Sistema"},
    emailLog:[{type:"auto_test",status:"skipped",to:"",at:created,provider:"No aplica"}],
    chat:[
      {by:"Sistema de prueba diaria",text:"Solicitud de prueba radicada automáticamente para alimentar Supabase.",at:created,role:"Sistema"},
      {by:responsible.name||userName(responsible.id),text:"Solicitud de prueba aceptada automáticamente.",at:accepted,role:"Sistema"},
      {by:responsible.name||userName(responsible.id),text:"Solicitud de prueba resuelta automáticamente. Flujo validado correctamente.",at:resolved,role:"Sistema"},
      {by:"Sistema de prueba diaria",text:"Solicitud de prueba cerrada automáticamente con trazabilidad completa.",at:closed,role:"Sistema"}
    ],
    timeline:[
      {label:"Radicación automática",text:"Solicitud de prueba creada para alimentar Supabase.",at:created},
      {label:"Aceptación automática",text:"El sistema simuló la aceptación de la solicitud.",at:accepted},
      {label:"Resolución automática",text:"El sistema simuló la resolución de la solicitud.",at:resolved},
      {label:"Cierre automático",text:"El sistema cerró la solicitud de prueba.",at:closed}
    ],
    created_at:created,
    updated_at:closed
  };
  if(typeof ticketQualityFromObject==="function")ticket.quality=ticketQualityFromObject(ticket);
  if(typeof makeSlaMeta==="function")ticket.sla=makeSlaMeta(ticket);
  await saveRecord(tables.tickets,ticket);
  state.tickets=await listRecords(tables.tickets);
  console.info("Prueba automática diaria creada:",ticket.code);
  return ticket;
}
async function ensureDailyAutoTest(){
  try{
    const t=await createDailyAutoTestTicket();
    if(t && isInternal()){
      setTimeout(()=>toast(`Prueba diaria creada y cerrada: ${t.code}`),600);
    }
  }catch(e){
    console.warn("No se pudo crear la prueba diaria automática",e);
  }
}

guidedAskStep=async function(cfg){
  const options=cfg.options||null;
  const htmlOptions=options?`<select id="guided-input" class="swal2-select">${options.map(o=>`<option ${o===cfg.value?'selected':''}>${escapeHtml(o)}</option>`).join("")}</select>`:"";
  const result=await Swal.fire({
    title:cfg.title,
    html:`<div class="guided-step-box"><p>${escapeHtml(cfg.text)}</p>${htmlOptions}</div>`,
    input:options?undefined:(cfg.input||"text"),
    inputValue:options?undefined:(cfg.value||""),
    inputPlaceholder:cfg.placeholder||"",
    showDenyButton:true,showCancelButton:false,
    confirmButtonText:"Siguiente",denyButtonText:"Quiero hacerlo manual",
    confirmButtonColor:"#0d5bd2",denyButtonColor:"#f7bf24",
    allowOutsideClick:false,customClass:{popup:"guided-clean-popup"},
    preConfirm:(v)=>{
      const val=options?document.getElementById("guided-input")?.value:v;
      if(cfg.required!==false&&!String(val||"").trim()){Swal.showValidationMessage("Este dato es necesario para organizar bien la solicitud.");return false}
      return String(val||"").trim();
    }
  });
  if(result.isDenied||!result.isConfirmed){chooseManualRadication();return GUIDED_MANUAL_VALUE}
  return result.value||"";
};
function isManualStop(v){return v===GUIDED_MANUAL_VALUE||v===null}

startGuidedRadication=async function(fromOffer=false){
  state.guidedManualMode=false;
  ensureCreateViewStable();
  const current=guidedCurrentFormData();
  const data={};
  if(state.user?.role==="Solicitante"){
    data.requesterName=await guidedAskStep({title:"Tu nombre",text:"Escribe tu nombre completo.",placeholder:"Nombre del solicitante",value:current.requesterName});
    if(isManualStop(data.requesterName))return;
    data.requesterEmail=await guidedAskStep({title:"Correo",text:"Escribe tu correo para enviarte el comprobante. Si no tienes, puedes dejarlo vacío.",placeholder:"correo@empresa.com",value:current.requesterEmail,required:false});
    if(isManualStop(data.requesterEmail))return;
  }else{
    data.requesterName=current.requesterName||state.user?.name||"";
    data.requesterEmail=current.requesterEmail||"";
  }
  data.area=await guidedAskStep({title:"Área o proceso",text:"¿De qué área o proceso viene la solicitud?",placeholder:"Ej. Cartera, logística, ventas, producción",value:current.requesterArea});
  if(isManualStop(data.area))return;
  data.need=await guidedAskStep({title:"Necesidad",text:"Cuéntame qué necesitas o qué problema ocurrió.",input:"textarea",placeholder:"Ej. No puedo subir el PDF de una factura y se queda cargando",value:current.description||current.title});
  if(isManualStop(data.need))return;
  data.caseType=await guidedAskStep({title:"Tipo de caso",text:"Selecciona lo que más se parece a tu caso.",options:["Documento","Procedimiento","Auditoría","Indicador/KPI","Riesgo/Hallazgo","Capacitación","Mejora continua","Consulta general"],value:current.category||"Documento"});
  if(isManualStop(data.caseType))return;
  data.evidence=await guidedAskStep({title:"Evidencia",text:"¿Tienes evidencia, enlace, captura, PDF, acta, matriz o archivo?",input:"textarea",placeholder:"Ej. Tengo captura y PDF / No tengo evidencia todavía",value:current.evidence||""});
  if(isManualStop(data.evidence))return;

function isCreateMobile(){
  return window.matchMedia("(max-width: 880px)").matches && state?.view==="create";

function applyCreateMobileCompact(){
  document.body.classList.toggle("create-mobile-compact",isCreateMobile());
  if(isCreateMobile()){
    document.documentElement.style.background="#f7fbff";
    document.body.style.background="#f7fbff";
    document.body.style.overflowY="auto";
    document.body.style.position="static";
    const main=document.querySelector(".main");
    if(main){
      main.style.overflow="visible";
      main.style.height="auto";
      main.style.minHeight="0";
      main.style.maxHeight="none";
    }
  }
}
function jumpCreateToTop(){
  if(!isCreateMobile())return;
  requestAnimationFrame(()=>{
    try{window.scrollTo(0,0)}catch(e){}
    const main=document.querySelector(".main");
    if(main){
      try{main.scrollTop=0;main.scrollLeft=0}catch(e){}
    }
  });
}

/* =========================================================
   QA ROOT FIX MENU MOVIL - JS AISLADO
   ========================================================= */
(function(){
  function isMobileQA(){
    return window.matchMedia("(max-width:880px)").matches;
  }

  function esc(v){
    if(typeof escapeHtml==="function") return escapeHtml(v);
    return String(v ?? "").replace(/[&<>"']/g,function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }

  function qaItems(){
    if(typeof isInternal==="function" && !isInternal()){
      return [
        {view:"create",icon:"📝",label:"Radicar / consultar"},
        {view:"ai",icon:"🤖",label:"IA Calidad"},
        {view:"game",icon:"🎮",label:"Juegos IA"}
      ];
    }

    const items=[
      {view:"dashboard",icon:"🏠",label:"Inicio"},
      {view:"create",icon:"📝",label:"Nueva solicitud"},
      {view:"tickets",icon:"🎫",label:"Solicitudes"},
      {view:"ai",icon:"🤖",label:"IA Calidad"},
      {view:"game",icon:"🎮",label:"Juegos IA"}
    ];

    if(typeof hasLead==="function" && hasLead()){
      items.push({view:"kpis",icon:"📊",label:"KPIs"});
    }

    return items;
  }

  function qaClose(){
    document.body.classList.remove("qa-menu-open");
  }

  function qaNavigate(view){
    qaClose();
    setTimeout(function(){
      if(typeof setView==="function") setView(view);
    },80);
  }

  function qaRefresh(){
    qaClose();
    setTimeout(function(){
      if(typeof refreshData==="function") refreshData();
    },80);
  }

  function qaLogout(){
    qaClose();
    setTimeout(function(){
      if(typeof logout==="function") logout();
    },80);
  }

  function qaBuildDrawer(){
    let bg=document.getElementById("qaMobileMenuBackdrop");
    if(!bg){
      bg=document.createElement("div");
      bg.id="qaMobileMenuBackdrop";
      bg.addEventListener("click",function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        qaClose();
      });
      document.body.appendChild(bg);
    }

    let drawer=document.getElementById("qaMobileMenuDrawer");
    if(!drawer){
      drawer=document.createElement("aside");
      drawer.id="qaMobileMenuDrawer";
      drawer.setAttribute("aria-label","Menú móvil");
      document.body.appendChild(drawer);
    }

    const currentView=window.state?.view || "create";
    const avatar=window.state?.user?.avatar || window.assets?.fun || "";
    const logo=window.assets?.logo || "";
    const fallback=window.assets?.fun || "";
    const userName=window.state?.user?.name || "Solicitante general";
    const userRole=window.state?.user?.role || "Solicitante";

    drawer.innerHTML = `
      <div class="qa-menu-head">
        <img src="${logo}" alt="Dream Team de Calidad">
        <small>Mesa de ayuda de calidad y mejoramiento continuo.</small>
      </div>
      <div class="qa-menu-user">
        <img src="${avatar}" alt="Usuario">
        <div><strong>${esc(userName)}</strong><span>${esc(userRole)}</span></div>
      </div>
      <nav class="qa-menu-nav">
        ${qaItems().map(function(i){
          return `<button type="button" class="${currentView===i.view?'active':''}" data-qa-view="${i.view}"><span class="icon">${i.icon}</span><span>${i.label}</span></button>`;
        }).join("")}
      </nav>
      <div class="qa-menu-footer">
        <button type="button" data-qa-action="refresh">Actualizar</button>
        <button type="button" data-qa-action="logout">Salir</button>
      </div>`;

    const userImg=drawer.querySelector(".qa-menu-user img");
    if(userImg){
      userImg.onerror=function(){ this.src=fallback; };
    }

    drawer.querySelectorAll("[data-qa-view]").forEach(function(btn){
      const go=function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        qaNavigate(btn.getAttribute("data-qa-view"));
      };
      btn.addEventListener("click",go);
      btn.addEventListener("touchend",go,{passive:false});
    });

    const refresh=drawer.querySelector('[data-qa-action="refresh"]');
    if(refresh){
      const r=function(ev){ev.preventDefault();ev.stopPropagation();qaRefresh();};
      refresh.addEventListener("click",r);
      refresh.addEventListener("touchend",r,{passive:false});
    }

    const logoutBtn=drawer.querySelector('[data-qa-action="logout"]');
    if(logoutBtn){
      const l=function(ev){ev.preventDefault();ev.stopPropagation();qaLogout();};
      logoutBtn.addEventListener("click",l);
      logoutBtn.addEventListener("touchend",l,{passive:false});
    }

    return drawer;
  }

  function qaDisableOldSidebar(){
    const old=document.getElementById("sidebar");
    if(old && isMobileQA()){
      old.classList.remove("open");
      old.style.display="none";
      old.style.pointerEvents="none";
      old.style.visibility="hidden";
      old.style.width="0";
      old.style.height="0";
    }
  }

  function qaOpen(){
    qaBuildDrawer();
    qaDisableOldSidebar();
    document.body.classList.add("qa-menu-open");
  }

  function qaInstallButton(){
    const btn=document.querySelector(".mobile-menu");
    if(!btn) return;

    btn.removeAttribute("onclick");
    btn.onclick=null;

    if(btn.dataset.qaMenuInstalled==="1") return;
    btn.dataset.qaMenuInstalled="1";

    const openOrClose=function(ev){
      if(!isMobileQA()) return;
      ev.preventDefault();
      ev.stopPropagation();
      if(typeof ev.stopImmediatePropagation==="function") ev.stopImmediatePropagation();
      if(document.body.classList.contains("qa-menu-open")) qaClose();
      else qaOpen();
    };

    btn.addEventListener("click",openOrClose,true);
    btn.addEventListener("touchend",openOrClose,{capture:true,passive:false});
  }

  function qaInstall(){
    qaBuildDrawer();
    qaInstallButton();
    qaDisableOldSidebar();
  }

  window.toggleMenu=function(){
    if(isMobileQA()){
      if(document.body.classList.contains("qa-menu-open")) qaClose();
      else qaOpen();
      return;
    }
    const old=document.getElementById("sidebar");
    if(old) old.classList.toggle("open");
  };

  const oldRenderApp=window.renderApp;
  if(typeof oldRenderApp==="function"){
    window.renderApp=function(){
      oldRenderApp();
      qaInstall();
    };
  }

  const oldRenderView=window.renderView;
  if(typeof oldRenderView==="function"){
    window.renderView=function(){
      oldRenderView();
      qaInstall();
    };
  }

  const oldSetView=window.setView;
  if(typeof oldSetView==="function"){
    window.setView=function(view){
      qaClose();
      oldSetView(view);
      qaInstall();
    };
  }

  window.addEventListener("DOMContentLoaded",qaInstall);
  window.addEventListener("resize",function(){
    if(!isMobileQA()) qaClose();
    qaInstall();
  });

  window.qaOpenMobileMenu=qaOpen;
  window.qaCloseMobileMenu=qaClose;
})();

window.addEventListener('DOMContentLoaded',async()=>{
  prepareIntroStart();

  const steps=[
    "Preparando usuarios y roles...",
    "Sincronizando solicitudes y trazabilidad...",
    "Activando IA, juegos y productividad...",
    "Preparando interfaz final..."

  let stepIndex=0;
  const stepTimer=setInterval(()=>{
    if(!introState.started)return;
    stepIndex=(stepIndex+1)%steps.length;
    updateBootStatus(steps[stepIndex]);
  },1400);

  try{
    await seed();
    setupLogin();
    introState.appReady=true;
    if(!introState.started){
      updateBootStatus("Contenido listo. Pulsa iniciar para ver la intro.");
    }else{
      updateBootStatus("Contenido listo. Esperando que termine la intro...");
    }
    finishIntroWhenReady();
  }catch(e){
    console.error(e);
    introState.loadError=true;
    introState.appReady=true;
    setupLogin();
    updateBootStatus("Hubo una novedad al cargar. Entrando con respaldo local...");
    finishIntroWhenReady();
  }finally{
    setTimeout(()=>clearInterval(stepTimer),15000);
  }
});
